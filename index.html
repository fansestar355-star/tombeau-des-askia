<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askia Mohamed — Empire Songhaï</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0b0f1a;
            --accent:  #6c63ff;
            --accent2: #a78bfa;
            --gold:    #f9d58b;
            --text:    #e2e8f0;
            --muted:   #94a3b8;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        /* ── LAYOUT ── */
        .scene {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse 70% 80% at 75% 50%, rgba(108,99,255,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(167,139,250,0.08) 0%, transparent 60%),
                var(--bg);
        }

        /* ── TOP BAR ── */
        .top-bar {
            width: 100%;
            padding: 28px 50px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .top-label {
            font-size: 0.68rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .top-center {
            font-size: 0.72rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold);
            text-shadow: 0 0 18px rgba(249,213,139,0.4);
        }

        /* ── MAIN AREA ── */
        .main-area {
            flex: 1;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 50px 0 50px;
        }

        /* ── "GAO" géant ── */
        .hero-gao {
            position: absolute;
            top: -2%;
            left: 30px;
            font-family: 'Playfair Display', serif;
            font-size: clamp(9rem, 20vw, 17rem);
            font-weight: 900;
            color: var(--accent2);
            line-height: 1;
            letter-spacing: -0.02em;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
            will-change: transform, opacity;
        }

        /* ── MODÈLE 3D ── */
        .model-wrap {
            position: absolute;
            right: 0;
            top: 0;
            width: 58%;
            height: 100%;
            z-index: 3;
        }
        .model-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 80% at 50% 45%, rgba(108,99,255,0.32) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            background: transparent;
            --poster-color: transparent;
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
        }
        model-viewer.loaded { opacity: 1; }

        /* ── TEXTE HÉROS ── */
        .hero-text {
            position: relative;
            z-index: 5;
            padding-bottom: 56px;
            max-width: 48%;
        }

        /* Numéro/tag de chapitre */
        .chapter-tag {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 14px;
            min-height: 1em;
            will-change: transform, opacity;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 5.5vw, 5rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.01em;
            color: #fff;
            text-transform: uppercase;
            overflow: hidden;
            min-height: 3em;
        }

        .title-line {
            display: block;
            overflow: hidden;
            line-height: 1.05;
        }
        .title-line span {
            display: inline-block;
            will-change: transform, opacity;
        }

        /* Ligne dorée */
        .title-divider {
            height: 1px;
            background: linear-gradient(90deg, var(--gold), var(--accent2), transparent);
            margin: 18px 0;
            will-change: width, opacity;
        }

        .hero-desc {
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--muted);
            font-weight: 300;
            max-width: 320px;
            will-change: transform, opacity;
        }

        /* Bouton enquête */
        .btn-enquete {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 12px 28px;
            border-radius: 50px;
            border: 1.5px solid rgba(167,139,250,0.6);
            background: rgba(108,99,255,0.12);
            color: var(--accent2);
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
            will-change: opacity;
        }
        .btn-enquete:hover {
            background: rgba(108,99,255,0.28);
            border-color: var(--accent2);
            color: #fff;
            box-shadow: 0 0 24px rgba(108,99,255,0.3);
        }
        .btn-enquete::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2);
        }

        .btn-experience {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 11px 24px;
            border-radius: 50px;
            border: 1.5px solid rgba(249,213,139,0.45);
            background: rgba(249,213,139,0.07);
            color: var(--gold);
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-experience:hover {
            background: rgba(249,213,139,0.18);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 24px rgba(249,213,139,0.25);
        }
        .btn-experience::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold);
        }

        /* ── NAVIGATION DOTS ── */
        .nav-dots {
            display: flex;
            gap: 8px;
            margin-top: 32px;
            align-items: center;
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(167,139,250,0.25);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .dot.active {
            width: 22px;
            border-radius: 3px;
            background: var(--accent2);
            box-shadow: 0 0 8px rgba(167,139,250,0.5);
        }

        /* ── TOGGLE MODÈLE ── */
        .model-toggle {
            position: absolute;
            bottom: 32px;
            right: 32px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .toggle-label {
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            transition: color 0.3s ease;
        }
        .toggle-label.active { color: var(--accent2); }
        .toggle-arrow {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(167,139,250,0.45);
            background: rgba(108,99,255,0.12);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle-arrow:hover {
            background: rgba(108,99,255,0.28);
            border-color: var(--accent2);
            box-shadow: 0 0 18px rgba(108,99,255,0.35);
        }
        .toggle-arrow svg {
            width: 16px; height: 16px;
            stroke: var(--accent2);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── BOTTOM BAR ── */
        .bottom-bar {
            width: 100%;
            padding: 0 50px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .bottom-label {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(148,163,184,0.5);
        }
        .bottom-year {
            font-family: 'Playfair Display', serif;
            font-size: 0.75rem;
            color: rgba(249,213,139,0.35);
            letter-spacing: 0.25em;
            transition: all 0.5s ease;
        }

        /* ── HINT SCROLL ── */
        .scroll-hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .scroll-hint span {
            font-size: 0.58rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(167,139,250,0.45);
        }
        .scroll-arrow {
            width: 1px;
            height: 28px;
            background: linear-gradient(to top, var(--accent2), transparent);
            animation: scrollPulse 1.8s ease-in-out infinite;
        }
        @keyframes scrollPulse {
            0%, 100% { opacity: 0.2; transform: scaleY(0.7) translateY(6px); }
            50%       { opacity: 0.8; transform: scaleY(1) translateY(0); }
        }
        .scroll-hint.hidden { opacity: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .model-wrap   { width: 100%; opacity: 0.35; }
            .hero-text    { max-width: 100%; }
            .top-bar, .main-area, .bottom-bar { padding-left: 24px; padding-right: 24px; }
            .hero-gao     { font-size: clamp(6rem, 28vw, 9rem); }
        }
    </style>
</head>
<body>
<div class="scene">

    <!-- Top bar -->
    <div class="top-bar">
        <span class="top-label">Conservation du patrimoine</span>
        <span class="top-center">Askia Mohamed — Empire Songhaï</span>
        <span class="top-label">Gao historique</span>
    </div>

    <!-- Zone principale -->
    <div class="main-area">

        <div class="hero-gao" id="hero-gao">GAO</div>

        <!-- Modèle -->
        <div class="model-wrap">
            <model-viewer
                id="mv"
                src="assets/3d/Askia_Mohamed_draw.glb"
                camera-orbit="0deg 85deg 2.2m"
                interpolation-decay="200"
                interaction-prompt="none"
                shadow-intensity="0.8"
                exposure="1.1"
                tone-mapping="commerce">
            </model-viewer>

            <div class="model-toggle">
                <span class="toggle-label active" id="lbl-draw">Dessin</span>
                <button class="toggle-arrow" id="arrow-left" title="Précédent">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="toggle-arrow" id="arrow-right" title="Suivant">
                    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
                </button>
                <span class="toggle-label" id="lbl-real">Réel</span>
            </div>
        </div>

        <!-- Texte héros -->
        <div class="hero-text">
            <div class="chapter-tag" id="ch-tag"></div>
            <h1 class="hero-title" id="ch-title">
                <span class="title-line"><span>Askia Mohamed</span></span>
                <span class="title-line"><span>Roi des Rois</span></span>
            </h1>
            <div class="title-divider" id="ch-divider" style="width:200px;"></div>
            <p class="hero-desc" id="ch-desc">L'empereur bâtisseur,<br>réformateur de l'Afrique de l'Ouest.</p>
            <a class="btn-enquete" id="ch-btn" href="#">Enquête historique</a>
            <a class="btn-experience" href="experience-personnage.html">Explorer le personnage</a>
            <div class="nav-dots" id="nav-dots"></div>
        </div>

    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <span class="bottom-label">Conservation du patrimoine</span>
        <span class="bottom-year" id="bottom-year">1495 · Gao · Mali</span>
        <span class="bottom-label">Gao historique</span>
    </div>

</div>

<!-- Hint scroll -->
<div class="scroll-hint" id="scroll-hint">
    <div class="scroll-arrow"></div>
    <span>Défiler</span>
</div>

<script>
/* ══════════════════════════════════════════════
   CHAPITRES — données tirées du rapport historique
══════════════════════════════════════════════ */
const CHAPTERS = [
    {
        gao:    "GAO",
        tag:    "",
        camera: "0deg 85deg 2.2m",
        lines:  ["Askia Mohamed", "Roi des Rois"],
        desc:   "L'empereur bâtisseur,\nréformateur de l'Afrique de l'Ouest.",
        btn:    true,
        year:   "1495 · Gao · Mali"
    },
    {
        gao:    "1493",
        tag:    "La prise du pouvoir",
        camera: "45deg 82deg 2.2m",
        lines:  ["L'Homme", "qui refusa", "d'obéir"],
        desc:   "Mohammed Touré renverse la dynastie de Sunni Ali Ber et prend le titre d'Askia — «celui qui ne sera pas». Il fonde une nouvelle légitimité sur l'islam et la justice.",
        btn:    false,
        year:   "1493 · Empire Songhaï"
    },
    {
        gao:    "EMPIRE",
        tag:    "L'apogée Songhaï",
        camera: "90deg 80deg 2.0m",
        lines:  ["De l'Or", "et du Sel"],
        desc:   "De Tombouctou à Agadez, l'Empire Songhaï contrôle les routes trans-sahariennes. Askia fait de Tombouctou un phare intellectuel du monde islamique.",
        btn:    false,
        year:   "1493 — 1528 · Apogée"
    }
];

/* ══════════════════════════════════════════════
   ÉTAT
══════════════════════════════════════════════ */
let current     = 0;
let transitioning = false;

const mv        = document.getElementById('mv');
const heroGao   = document.getElementById('hero-gao');
const chTag     = document.getElementById('ch-tag');
const chTitle   = document.getElementById('ch-title');
const chDivider = document.getElementById('ch-divider');
const chDesc    = document.getElementById('ch-desc');
const chBtn     = document.getElementById('ch-btn');
const bottomY   = document.getElementById('bottom-year');
const scrollHint= document.getElementById('scroll-hint');
const dotsWrap  = document.getElementById('nav-dots');

/* ── Génère les dots ── */
CHAPTERS.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
});

/* ── Chargement modèle ── */
mv.addEventListener('load', () => mv.classList.add('loaded'));

/* ══════════════════════════════════════════════
   TRANSITION
══════════════════════════════════════════════ */
function goTo(index) {
    if (transitioning || index === current || index < 0 || index >= CHAPTERS.length) return;
    transitioning = true;

    const dir      = index > current ? 1 : -1;
    const next     = CHAPTERS[index];
    const tl       = gsap.timeline({ onComplete: () => { transitioning = false; } });
    const lines    = chTitle.querySelectorAll('.title-line span');

    /* ─── SORTIE ─── */
    tl.to(heroGao, { y: dir * -40, opacity: 0, duration: 0.45, ease: 'power2.in' }, 0)
      .to(chTag,   { y: -18, opacity: 0, duration: 0.3, ease: 'power2.in' }, 0)
      .to(lines,   { y: dir * -60 + '%', opacity: 0, stagger: 0.07, duration: 0.4, ease: 'power2.in' }, 0.05)
      .to(chDivider, { width: 0, opacity: 0, duration: 0.35, ease: 'power2.in' }, 0.1)
      .to(chDesc,  { y: -16, opacity: 0, duration: 0.35, ease: 'power2.in' }, 0.15)
      .to(chBtn,   { y: -12, opacity: 0, duration: 0.3, ease: 'power2.in' }, 0.18);

    /* ─── MISE À JOUR CONTENU (milieu de l'animation) ── */
    tl.call(() => {
        /* Camera modèle */
        mv.setAttribute('camera-orbit', next.camera);

        /* Année en bas */
        bottomY.textContent = next.year;

        /* GAO / année */
        heroGao.textContent = next.gao;

        /* Tag */
        chTag.textContent = next.tag;

        /* Titre — reconstruction des lignes */
        chTitle.innerHTML = '';
        next.lines.forEach(txt => {
            const line = document.createElement('span');
            line.className = 'title-line';
            const inner = document.createElement('span');
            inner.textContent = txt;
            line.appendChild(inner);
            chTitle.appendChild(line);
        });

        /* Description */
        chDesc.innerHTML = next.desc.replace('\n', '<br>');

        /* Bouton */
        chBtn.style.display = next.btn ? 'inline-flex' : 'none';

        /* Dots */
        dotsWrap.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));

        current = index;

        /* Hint scroll : disparaît après le premier défilement */
        scrollHint.classList.add('hidden');
    });

    /* ─── ENTRÉE ─── */
    const enterOffset = dir * 50;
    tl.fromTo(heroGao,
        { y: -enterOffset, opacity: 0 },
        { y: 0, opacity: 0.78, duration: 0.6, ease: 'power3.out' }, '+=0.05')
      .fromTo(chTag,
        { y: 14, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.4, ease: 'power3.out' }, '<0.1')
      .fromTo(chTitle.querySelectorAll('.title-line span'),
        { y: '80%', opacity: 0 },
        { y: '0%', opacity: 1, stagger: 0.1, duration: 0.55, ease: 'power3.out' }, '<0.05')
      .fromTo(chDivider,
        { width: 0, opacity: 0 },
        { width: 200, opacity: 1, duration: 0.6, ease: 'power2.out' }, '<0.15')
      .fromTo(chDesc,
        { y: 16, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: 'power3.out' }, '<0.1')
      .fromTo(chBtn,
        { y: 12, opacity: 0 },
        { y: 0, opacity: next.btn ? 1 : 0, duration: 0.4, ease: 'power3.out' }, '<0.1');
}

/* ══════════════════════════════════════════════
   ENTRÉE INITIALE
══════════════════════════════════════════════ */
gsap.set(heroGao, { opacity: 0, y: 30 });
gsap.set(chTag,   { opacity: 0, y: 14 });
gsap.set([chDesc, chBtn], { opacity: 0, y: 16 });
gsap.set(chDivider, { width: 0, opacity: 0 });
gsap.set(chTitle.querySelectorAll('.title-line span'), { opacity: 0, y: '80%' });

const intro = gsap.timeline({ delay: 0.3 });
intro
    .to(heroGao, { opacity: 0.78, y: 0, duration: 1.0, ease: 'power3.out' })
    .to(chTag,   { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, '-=0.6')
    .to(chTitle.querySelectorAll('.title-line span'),
        { opacity: 1, y: '0%', stagger: 0.12, duration: 0.65, ease: 'power3.out' }, '-=0.4')
    .to(chDivider, { width: 200, opacity: 1, duration: 0.7, ease: 'power2.out' }, '-=0.3')
    .to(chDesc,  { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, '-=0.3')
    .to(chBtn,   { opacity: 1, y: 0, duration: 0.45, ease: 'power3.out' }, '-=0.2');

/* ══════════════════════════════════════════════
   SCROLL WHEEL
══════════════════════════════════════════════ */
let wheelCooldown = false;
window.addEventListener('wheel', (e) => {
    if (wheelCooldown) return;
    wheelCooldown = true;
    setTimeout(() => { wheelCooldown = false; }, 900);

    if (e.deltaY > 0) goTo(current + 1);   // scroll bas  → chapitre suivant
    else               goTo(current - 1);   // scroll haut → chapitre précédent
}, { passive: true });

/* ── Touch mobile ── */
let touchStartY = 0;
window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', e => {
    const delta = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(delta) < 30) return;
    if (delta < 0) goTo(current + 1);
    else           goTo(current - 1);
}, { passive: true });

/* ══════════════════════════════════════════════
   TOGGLE DRAW / REAL
══════════════════════════════════════════════ */
const models = [
    'assets/3d/Askia_Mohamed_draw.glb',
    'assets/3d/Askia_Mohamed_real.glb'
];
let modelIdx = 0;
const lblDraw = document.getElementById('lbl-draw');
const lblReal = document.getElementById('lbl-real');

function switchModel(idx) {
    modelIdx = idx;
    mv.classList.remove('loaded');
    mv.src = models[modelIdx];
    lblDraw.classList.toggle('active', modelIdx === 0);
    lblReal.classList.toggle('active', modelIdx === 1);
}

document.getElementById('arrow-right').addEventListener('click', () => switchModel(modelIdx === 0 ? 1 : 0));
document.getElementById('arrow-left').addEventListener('click',  () => switchModel(modelIdx === 0 ? 1 : 0));
</script>
</body>
</html>
