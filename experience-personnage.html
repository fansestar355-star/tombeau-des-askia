<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnage — Askia Mohamed</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0; }
    #canvas-wrap { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    #btn-back {
      position: fixed; top: 24px; left: 24px;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 50px;
      border: 1.5px solid rgba(167,139,250,0.45);
      background: rgba(11,15,26,0.7); color: #a78bfa;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      backdrop-filter: blur(12px); transition: all 0.3s ease; z-index: 10;
    }
    #btn-back:hover { background: rgba(108,99,255,0.25); border-color: #a78bfa; color: #fff; }

    #title-hud {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      font-size: 0.65rem; letter-spacing: 0.42em; text-transform: uppercase;
      color: #f9d58b; text-shadow: 0 0 18px rgba(249,213,139,0.35); z-index: 10;
      pointer-events: none;
    }

    #controls-hud {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 10;
      pointer-events: none;
    }
    .row { display: flex; gap: 6px; }
    .key {
      width: 40px; height: 40px; border-radius: 8px;
      border: 1.5px solid rgba(167,139,250,0.35);
      background: rgba(11,15,26,0.65); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: rgba(167,139,250,0.7); transition: all 0.15s ease;
    }
    .key.active {
      border-color: #a78bfa; background: rgba(108,99,255,0.3);
      color: #fff; box-shadow: 0 0 14px rgba(108,99,255,0.4);
    }
    .key svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    #info-hud {
      position: fixed; bottom: 130px; right: 28px; text-align: right;
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(148,163,184,0.5); line-height: 2; z-index: 10; pointer-events: none;
    }
    #anim-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      border: 1px solid rgba(167,139,250,0.3); background: rgba(108,99,255,0.1);
      font-size: 0.58rem; letter-spacing: 0.15em; color: #a78bfa; transition: all 0.4s ease;
    }
    #anim-badge.walk { border-color: rgba(249,213,139,0.4); background: rgba(249,213,139,0.08); color: #f9d58b; }

    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0b0f1a; z-index: 100; gap: 20px; transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar-wrap { width: 200px; height: 2px; background: rgba(167,139,250,0.15); border-radius: 2px; overflow: hidden; }
    #loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #6c63ff, #a78bfa); border-radius: 2px; transition: width 0.3s ease; }
    #loading-text { font-size: 0.62rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(167,139,250,0.6); }
  </style>
</head>
<body>

<div id="canvas-wrap"></div>

<a id="btn-back" href="index.html">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  Retour
</a>

<div id="title-hud">Askia Mohamed — Expérience interactive</div>

<div id="controls-hud">
  <div class="row">
    <div class="key" id="key-up"><svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg></div>
  </div>
  <div class="row">
    <div class="key" id="key-left"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
    <div class="key" id="key-down"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="key" id="key-right"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div style="font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:rgba(148,163,184,0.3);margin-top:6px;text-align:center;">
    Flèches ou WASD pour se déplacer
  </div>
</div>

<div id="info-hud">
  <div id="info-pos">0.0, 0.0</div>
  <div id="anim-badge">IDLE</div>
</div>

<div id="loading">
  <div id="loading-text">Chargement…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

/* ─── CONFIG ─── */
const WALK_SPEED   = 2.2;
const TURN_SPEED   = 2.0;
const CAM_DISTANCE = 3.5;
const CAM_HEIGHT   = 1.8;
const FADE_TIME    = 0.35;   // secondes pour la transition entre animations
const DRACO_PATH   = 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/';

/* ─── RENDERER ─── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

/* ─── SCÈNE ─── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f1a);
scene.fog        = new THREE.FogExp2(0x0b0f1a, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 200);
camera.position.set(0, CAM_HEIGHT, CAM_DISTANCE);

/* ─── LUMIÈRES ─── */
scene.add(new THREE.AmbientLight(0x6c63ff, 0.6));

const dirLight = new THREE.DirectionalLight(0xffd699, 2.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.setScalar(2048);
dirLight.shadow.camera.left = dirLight.shadow.camera.bottom = -15;
dirLight.shadow.camera.right = dirLight.shadow.camera.top  =  15;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0xa78bfa, 0.8);
rimLight.position.set(-4, 6, -4);
scene.add(rimLight);

/* ─── SOL ─── */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x2a1f0e, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(80, 40, 0x6c63ff, 0x1a1030);
grid.material.opacity = 0.15;
grid.material.transparent = true;
scene.add(grid);

/* ─── LOADERS ─── */
const draco = new DRACOLoader();
draco.setDecoderPath(DRACO_PATH);
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

/* ─── ÉTAT ─── */
let character  = null;
let mixer      = null;
let walkAction = null;
let idleAction = null;
let currentAnim = 'idle';   // 'idle' | 'walk'

/* ─── CHARGEMENT PARALLÈLE des deux GLB ─── */
const loadingBar  = document.getElementById('loading-bar');
const loadingText = document.getElementById('loading-text');

let charLoaded = false;
let idleLoaded = false;
let charGltf   = null;
let idleClip   = null;

function tryStart() {
  if (!charLoaded || !idleLoaded) return;

  /* ── Ajouter le personnage ── */
  character = charGltf.scene;
  character.traverse(obj => {
    if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
  });
  scene.add(character);

  /* ── AnimationMixer sur le personnage ── */
  mixer = new THREE.AnimationMixer(character);

  /* ── Action marche (depuis char1_walking.glb) ── */
  if (charGltf.animations.length > 0) {
    walkAction = mixer.clipAction(charGltf.animations[0]);
    walkAction.setLoop(THREE.LoopRepeat);
    walkAction.clampWhenFinished = false;
  }

  /* ── Action idle (depuis idle.glb, retargetée sur le mixer du personnage) ── */
  if (idleClip) {
    // Retargeter le clip idle sur la hiérarchie du personnage
    const retargeted = retargetClip(character, idleClip);
    idleAction = mixer.clipAction(retargeted);
    idleAction.setLoop(THREE.LoopRepeat);
    idleAction.clampWhenFinished = false;
    idleAction.play();   // Démarrer en idle
  }

  document.getElementById('loading').classList.add('hidden');
}

/* Chargement char1_walking.glb */
loader.load(
  'assets/3d/char1_walking.glb',
  (gltf) => {
    charGltf   = gltf;
    charLoaded = true;
    loadingText.textContent = idleLoaded ? 'Prêt !' : 'Chargement animation idle…';
    tryStart();
  },
  (xhr) => {
    if (xhr.total) loadingBar.style.width = Math.round(xhr.loaded / xhr.total * 60) + '%';
  },
  (err) => console.error('Erreur char1:', err)
);

/* Chargement idle.glb */
loader.load(
  'assets/3d/idle.glb',
  (gltf) => {
    idleClip   = gltf.animations[0] || null;
    idleLoaded = true;
    loadingText.textContent = charLoaded ? 'Prêt !' : 'Chargement personnage…';
    loadingBar.style.width = '100%';
    tryStart();
  },
  null,
  (err) => {
    console.warn('idle.glb non chargé, pas d\'animation idle:', err);
    idleLoaded = true;
    tryStart();
  }
);

/* ─── RETARGETING : applique un clip sur une nouvelle hiérarchie par nom d'os ─── */
function retargetClip(targetRoot, sourceClip) {
  // Construire un index { nomOs → Object3D } depuis le personnage cible
  const boneMap = {};
  targetRoot.traverse(obj => { boneMap[obj.name] = obj; });

  const newTracks = [];
  for (const track of sourceClip.tracks) {
    // Format GLB track name : "NomOs.propriété" ou "path/NomOs.propriété"
    const dotIdx  = track.name.lastIndexOf('.');
    const prop    = track.name.slice(dotIdx);            // ".quaternion", ".position", ...
    const rawName = track.name.slice(0, dotIdx);
    const boneName = rawName.split('/').pop();            // garder seulement le dernier segment

    const targetBone = boneMap[boneName];
    if (!targetBone) continue;                            // os inconnu → ignorer

    // Recréer le track en ciblant l'os dans la hiérarchie cible
    const TrackType = track.constructor;
    const newTrack  = new TrackType(
      targetBone.uuid + prop,
      track.times,
      track.values.slice()
    );
    newTracks.push(newTrack);
  }

  return new THREE.AnimationClip('idle', sourceClip.duration, newTracks);
}

/* ─── TRANSITION ANIMATIONS ─── */
function playIdle() {
  if (currentAnim === 'idle' || !idleAction) return;
  currentAnim = 'idle';
  walkAction?.fadeOut(FADE_TIME);
  idleAction.reset().fadeIn(FADE_TIME).play();
  document.getElementById('anim-badge').textContent = 'IDLE';
  document.getElementById('anim-badge').classList.remove('walk');
}

function playWalk() {
  if (currentAnim === 'walk' || !walkAction) return;
  currentAnim = 'walk';
  idleAction?.fadeOut(FADE_TIME);
  walkAction.reset().fadeIn(FADE_TIME).play();
  document.getElementById('anim-badge').textContent = 'MARCHE';
  document.getElementById('anim-badge').classList.add('walk');
}

/* ─── CLAVIER ─── */
const keys   = { up: false, down: false, left: false, right: false };
const keyMap = {
  ArrowUp: 'up', KeyW: 'up', ArrowDown: 'down', KeyS: 'down',
  ArrowLeft: 'left', KeyA: 'left', ArrowRight: 'right', KeyD: 'right',
};
const keyEls = {
  up:    document.getElementById('key-up'),
  down:  document.getElementById('key-down'),
  left:  document.getElementById('key-left'),
  right: document.getElementById('key-right'),
};

window.addEventListener('keydown', e => {
  const k = keyMap[e.code];
  if (!k) return;
  e.preventDefault();
  keys[k] = true;
  keyEls[k].classList.add('active');
});

window.addEventListener('keyup', e => {
  const k = keyMap[e.code];
  if (!k) return;
  keys[k] = false;
  keyEls[k].classList.remove('active');
});

/* ─── CAMÉRA 3ÈME PERSONNE ─── */
const camPos = new THREE.Vector3();
const camTgt = new THREE.Vector3();

function updateCamera() {
  if (!character) return;
  const a = character.rotation.y;
  camPos.set(
    character.position.x - Math.sin(a) * CAM_DISTANCE,
    character.position.y + CAM_HEIGHT,
    character.position.z - Math.cos(a) * CAM_DISTANCE
  );
  camera.position.lerp(camPos, 0.08);
  camTgt.copy(character.position);
  camTgt.y += 0.9;
  camera.lookAt(camTgt);
}

/* ─── BOUCLE ─── */
const clock   = new THREE.Clock();
const infoPos = document.getElementById('info-pos');

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (character) {
    const moving = keys.up || keys.down || keys.left || keys.right;

    if (keys.left)  character.rotation.y += TURN_SPEED * dt;
    if (keys.right) character.rotation.y -= TURN_SPEED * dt;

    if (keys.up) {
      character.position.x -= Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z -= Math.cos(character.rotation.y) * WALK_SPEED * dt;
    }
    if (keys.down) {
      character.position.x += Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z += Math.cos(character.rotation.y) * WALK_SPEED * dt;
    }

    /* Changement d'animation */
    if (moving) playWalk(); else playIdle();

    if (mixer) mixer.update(dt);
    updateCamera();

    infoPos.textContent =
      `${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;
  }

  renderer.render(scene, camera);
}

animate();

/* ─── RESIZE ─── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
