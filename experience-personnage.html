<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnage — Askia Mohamed</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0f1a;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }

    #canvas-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Retour */
    #btn-back {
      position: fixed;
      top: 24px; left: 24px;
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(167,139,250,0.45);
      background: rgba(11,15,26,0.7);
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    #btn-back:hover {
      background: rgba(108,99,255,0.25);
      border-color: #a78bfa;
      color: #fff;
    }

    /* Titre */
    #title-hud {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #f9d58b;
      text-shadow: 0 0 18px rgba(249,213,139,0.35);
    }

    /* Contrôles clavier */
    #controls-hud {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #controls-hud .row {
      display: flex;
      gap: 6px;
    }
    .key {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1.5px solid rgba(167,139,250,0.35);
      background: rgba(11,15,26,0.65);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(167,139,250,0.7);
      transition: all 0.15s ease;
    }
    .key.active {
      border-color: #a78bfa;
      background: rgba(108,99,255,0.3);
      color: #fff;
      box-shadow: 0 0 14px rgba(108,99,255,0.4);
    }
    .key svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Vitesse info */
    #info-hud {
      position: fixed;
      bottom: 120px;
      right: 28px;
      text-align: right;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      line-height: 1.8;
    }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0f1a;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(167,139,250,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #loading-text {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.6);
    }

    /* ── Joystick ── */
    #joystick-zone {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 130px;
      z-index: 10;
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.2);
      background: rgba(11,15,26,0.45);
      backdrop-filter: blur(10px);
      touch-action: none; user-select: none;
      pointer-events: all;
    }
    #joystick-handle {
      position: absolute; top: 50%; left: 50%;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, rgba(255,220,100,0.9), rgba(200,140,0,0.7));
      border: 2px solid rgba(255,220,100,0.5);
      box-shadow: 0 0 18px rgba(255,200,0,0.3);
      transform: translate(-50%,-50%);
      transition: transform 0.08s ease;
      pointer-events: none;
    }
    #hint {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(167,139,250,0.25); z-index: 10; pointer-events: none;
      white-space: nowrap;
    }
    /* Cacher les touches flèches sur mobile */
    @media (max-width: 768px) { #controls-hud { display: none; } }
  </style>
</head>
<body>

<div id="canvas-wrap"></div>

<!-- HUD -->
<div id="hud">
  <a id="btn-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Retour
  </a>

  <div id="title-hud">Askia Mohamed — Expérience interactive</div>

  <div id="controls-hud">
    <div class="row">
      <div class="key" id="key-up">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </div>
    </div>
    <div class="row">
      <div class="key" id="key-left">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <div class="key" id="key-down">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="key" id="key-right">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <div style="font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:rgba(148,163,184,0.35); margin-top:6px; text-align:center;">
      Flèches ou WASD pour se déplacer
    </div>
  </div>

  <div id="info-hud">
    <div id="info-pos">Position : 0, 0</div>
    <div id="info-anim">Animation : idle</div>
  </div>
</div>

<!-- Joystick -->
<div id="joystick-zone"><div id="joystick-handle"></div></div>
<div id="hint">Joystick · Flèches · WASD</div>

<!-- Loading -->
<div id="loading">
  <div id="loading-text">Chargement du personnage…</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":              "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';

/* ═══════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════ */
const WALK_SPEED   = 2.2;   // m/s
const TURN_SPEED   = 2.0;   // rad/s
const CAM_DISTANCE = 3.5;
const CAM_HEIGHT   = 1.8;
const MODEL_PATH   = 'assets/3d/char1_walking.glb';
const DRACO_PATH   = new URL('.', document.baseURI).href + 'assets/draco/';

/* ═══════════════════════════════════════════
   SCÈNE
═══════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f1a);
scene.fog        = new THREE.FogExp2(0x0b0f1a, 0.04);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 200);
camera.position.set(0, CAM_HEIGHT, CAM_DISTANCE);

/* ── LUMIÈRES ── */
const ambLight = new THREE.AmbientLight(0x6c63ff, 0.6);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xffd699, 2.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.setScalar(2048);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far  = 50;
dirLight.shadow.camera.left = dirLight.shadow.camera.bottom = -15;
dirLight.shadow.camera.right = dirLight.shadow.camera.top   =  15;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0xa78bfa, 0.8);
rimLight.position.set(-4, 6, -4);
scene.add(rimLight);

/* ── SOL ── */
const groundGeo = new THREE.PlaneGeometry(60, 60, 30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2a1f0e,
  roughness: 0.95,
  metalness: 0.0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grille subtile sur le sol
const gridHelper = new THREE.GridHelper(60, 30, 0x6c63ff, 0x1a1030);
gridHelper.material.opacity = 0.18;
gridHelper.material.transparent = true;
scene.add(gridHelper);

/* ═══════════════════════════════════════════
   CHARGEMENT DU MODÈLE
═══════════════════════════════════════════ */
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath(DRACO_PATH);

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer      = null;
let walkAction = null;
let character  = null;
let bones      = {};
let isWalking  = false;
let fadeOut    = false;
let fadeTimer  = 0;
let idleTimer  = 0;
const FADE_DUR = 0.5;

/* Idle procédural */
const _Q = new THREE.Quaternion();
const _E = new THREE.Euler();
const D  = g => g * Math.PI / 180;

function applyIdle(t) {
  const br = Math.PI*2 * t / 5.0;
  const lk = Math.PI*2 * t / 6.0;
  function rot(name, rx, ry, rz) {
    const b = bones[name];
    if (!b || !b.userData.rest) return;
    _E.set(rx, ry, rz, 'XYZ');
    _Q.setFromEuler(_E);
    b.quaternion.copy(b.userData.rest).multiply(_Q);
  }
  rot('Hips',          D(0.2)*Math.sin(br), 0, 0);
  rot('Spine',         D(0.5)*Math.sin(br), 0, 0);
  rot('Spine1',        D(0.4)*Math.sin(br), 0, 0);
  rot('Spine2',        D(0.3)*Math.sin(br), 0, 0);
  rot('Neck',          0, D(10)*Math.sin(lk)*0.3, 0);
  rot('Head',          0, D(30)*Math.sin(lk), 0);
  rot('LeftShoulder',  0, 0, 0);
  rot('LeftArm',       D(1)*Math.sin(br), 0, 0);
  rot('LeftForeArm',   D(2), 0, 0);
  rot('LeftHand',      0, 0, 0);
  rot('RightShoulder', 0, 0, 0);
  rot('RightArm',      D(1)*Math.sin(br + Math.PI), 0, 0);
  rot('RightForeArm',  D(2), 0, 0);
  rot('RightHand',     0, 0, 0);
}

gltfLoader.load(
  MODEL_PATH,
  (gltf) => {
    character = gltf.scene;

    character.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow    = true;
        obj.receiveShadow = true;
      }
    });

    // Positionner au centre, debout sur le sol
    character.position.set(0, 0, 0);
    scene.add(character);

    // Collecter les bones + pose de repos pour l'idle
    character.traverse(o => {
      if (o.isBone) { bones[o.name] = o; o.userData.rest = o.quaternion.clone(); }
    });

    // Animation mixer
    mixer = new THREE.AnimationMixer(character);
    if (gltf.animations.length > 0) {
      walkAction = mixer.clipAction(gltf.animations[0]);
      walkAction.setLoop(THREE.LoopRepeat);
      walkAction.clampWhenFinished = false;
    }

    // Masquer le loading
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('info-anim').textContent = 'Animation : idle';
  },
  (xhr) => {
    const pct = Math.round((xhr.loaded / xhr.total) * 100);
    document.getElementById('loading-bar').style.width = pct + '%';
    document.getElementById('loading-text').textContent = `Chargement… ${pct}%`;
  },
  (err) => {
    document.getElementById('loading-text').textContent = 'Erreur de chargement : ' + err.message;
    console.error(err);
  }
);

/* ═══════════════════════════════════════════
   CLAVIER
═══════════════════════════════════════════ */
const keys = { up: false, down: false, left: false, right: false };
const keyMap = {
  ArrowUp:    'up',   KeyW: 'up',
  ArrowDown:  'down', KeyS: 'down',
  ArrowLeft:  'left', KeyA: 'left',
  ArrowRight: 'right',KeyD: 'right',
};

const keyEls = {
  up:    document.getElementById('key-up'),
  down:  document.getElementById('key-down'),
  left:  document.getElementById('key-left'),
  right: document.getElementById('key-right'),
};

window.addEventListener('keydown', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = true; keyEls[k].classList.add('active'); e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = false; keyEls[k].classList.remove('active'); }
});

/* ═══════════════════════════════════════════
   JOYSTICK TACTILE
═══════════════════════════════════════════ */
const jZone   = document.getElementById('joystick-zone');
const jHandle = document.getElementById('joystick-handle');
const J_RADIUS = 38, J_DEAD = 0.25;
let jActive = false, jId = null, jCx = 0, jCy = 0;

function jStart(cx, cy, tx, ty) { jActive=true; jCx=cx; jCy=cy; jMove(tx,ty); }
function jMove(tx, ty) {
  if (!jActive) return;
  const dx=tx-jCx, dy=ty-jCy, dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,J_RADIUS);
  const nx=dist>0?dx/dist:0, ny=dist>0?dy/dist:0;
  jHandle.style.transform=`translate(calc(-50% + ${nx*cl}px), calc(-50% + ${ny*cl}px))`;
  keys.up    = ny < -J_DEAD;
  keys.down  = ny >  J_DEAD;
  keys.left  = nx < -J_DEAD;
  keys.right = nx >  J_DEAD;
}
function jEnd() {
  jActive=false;
  jHandle.style.transform='translate(-50%,-50%)';
  keys.up=keys.down=keys.left=keys.right=false;
}
jZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=jZone.getBoundingClientRect(), t=e.changedTouches[0];
  jId=t.identifier; jStart(r.left+r.width/2, r.top+r.height/2, t.clientX, t.clientY);
},{passive:false});
window.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches) if(t.identifier===jId){e.preventDefault();jMove(t.clientX,t.clientY);break;}
},{passive:false});
window.addEventListener('touchend',    e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
window.addEventListener('touchcancel', e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
jZone.addEventListener('mousedown', e=>{
  const r=jZone.getBoundingClientRect();
  jStart(r.left+r.width/2, r.top+r.height/2, e.clientX, e.clientY);
});
window.addEventListener('mousemove', e=>{if(jActive)jMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',   ()=>{if(jActive)jEnd();});

/* ═══════════════════════════════════════════
   CAMÉRA — suit le personnage en douceur
═══════════════════════════════════════════ */
const camTarget   = new THREE.Vector3();
const camPosition = new THREE.Vector3();

function updateCamera() {
  if (!character) return;

  const angle = character.rotation.y;
  const idealX = character.position.x - Math.sin(angle) * CAM_DISTANCE;
  const idealY = character.position.y + CAM_HEIGHT;
  const idealZ = character.position.z - Math.cos(angle) * CAM_DISTANCE;

  camPosition.set(idealX, idealY, idealZ);
  camera.position.lerp(camPosition, 0.08);

  camTarget.copy(character.position).y += 0.9;
  camera.lookAt(camTarget);
}

/* ═══════════════════════════════════════════
   BOUCLE PRINCIPALE
═══════════════════════════════════════════ */
const clock = new THREE.Clock();
const infoPos  = document.getElementById('info-pos');
const infoAnim = document.getElementById('info-anim');

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (character) {
    let moving = false;

    // Rotation
    if (keys.left)  character.rotation.y += TURN_SPEED * dt;
    if (keys.right) character.rotation.y -= TURN_SPEED * dt;

    // Déplacement avant/arrière
    if (keys.up) {
      character.position.x -= Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z -= Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }
    if (keys.down) {
      character.position.x += Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z += Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }

    // Transition walk ↔ idle avec fondu 0.5s
    if (moving && !isWalking) {
      isWalking = true; fadeOut = false; idleTimer = 0;
      if (walkAction) walkAction.reset().play();
      infoAnim.textContent = 'Animation : marche';
    } else if (!moving && isWalking) {
      isWalking = false; fadeOut = true; fadeTimer = 0;
      if (walkAction) walkAction.fadeOut(FADE_DUR);
      infoAnim.textContent = 'Animation : idle';
    }

    // Animation
    if (isWalking) {
      if (mixer) mixer.update(dt);
    } else if (fadeOut) {
      fadeTimer += dt;
      if (mixer) mixer.update(dt);
      if (fadeTimer >= FADE_DUR) { fadeOut = false; if (walkAction) walkAction.stop(); }
    } else {
      idleTimer += dt;
      applyIdle(idleTimer);
    }

    // Info position
    infoPos.textContent = `Position : ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;

    updateCamera();
  }

  renderer.render(scene, camera);
}

animate();

/* ═══════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
