<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Askia Mohamed — Expérience</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:#111; overflow:hidden; font-family:system-ui,sans-serif; color:#fff; touch-action:none; }

    #ui-back {
      position:fixed; top:20px; left:20px; z-index:10;
      padding:10px 20px; border-radius:40px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.7);
      font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase;
      text-decoration:none; backdrop-filter:blur(10px);
    }

    /* ── Joystick ── */
    #joystick-zone {
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
      width:130px; height:130px; z-index:10;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
      touch-action:none; user-select:none;
    }
    #joystick-handle {
      position:absolute; top:50%; left:50%;
      width:52px; height:52px; border-radius:50%;
      background:radial-gradient(circle at 38% 38%, rgba(255,220,100,0.9), rgba(200,140,0,0.7));
      border:2px solid rgba(255,220,100,0.5);
      box-shadow:0 0 18px rgba(255,200,0,0.3);
      transform:translate(-50%,-50%);
      transition:transform 0.08s ease;
      pointer-events:none;
    }
    #hint {
      position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
      font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(255,255,255,0.18); z-index:10; pointer-events:none;
      white-space:nowrap;
    }

    #ui-status {
      position:fixed; top:22px; right:22px; z-index:10;
      font-size:0.55rem; letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(255,255,255,0.25);
    }

    #screen-load {
      position:fixed; inset:0; z-index:100;
      background:#111; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      transition:opacity 0.5s;
    }
    #screen-load.hide { opacity:0; pointer-events:none; }
    #load-label { font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.38); }
    #load-bar-bg { width:180px; height:2px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
    #load-bar    { height:100%; width:0%; background:#ffd; border-radius:2px; transition:width 0.25s; }

    #screen-err {
      display:none; position:fixed; inset:0; z-index:200;
      background:#111; flex-direction:column;
      align-items:center; justify-content:center; gap:12px;
    }
    #screen-err.show { display:flex; }
    #screen-err h2  { color:#f66; font-size:0.88rem; letter-spacing:0.1em; }
    #screen-err pre { color:rgba(255,255,255,0.38); font-size:0.6rem; max-width:440px; white-space:pre-wrap; text-align:center; line-height:1.7; }
  </style>
</head>
<body>

<a id="ui-back" href="index.html">← Retour</a>
<div id="ui-status">IDLE</div>

<div id="joystick-zone">
  <div id="joystick-handle"></div>
</div>
<div id="hint">Joystick · Flèches · WASD</div>

<div id="screen-load">
  <div id="load-label">Chargement du personnage…</div>
  <div id="load-bar-bg"><div id="load-bar"></div></div>
</div>

<div id="screen-err">
  <h2>Erreur de chargement</h2>
  <pre id="err-text"></pre>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }  from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

/* ── Erreurs globales ── */
function fatal(msg) {
  document.getElementById('screen-load').style.display = 'none';
  document.getElementById('err-text').textContent = msg;
  document.getElementById('screen-err').classList.add('show');
}
window.addEventListener('error',             e => fatal(e.message));
window.addEventListener('unhandledrejection', e => fatal(String(e.reason)));

const BASE = new URL('.', document.baseURI).href;

/* ── Renderer ── */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

/* ── Scène ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9ecfed);
scene.fog        = new THREE.Fog(0xd4b896, 80, 220);

/* ── Caméra ── */
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.05, 300);

/* ── Lumières ── */
scene.add(new THREE.HemisphereLight(0x9ecfed, 0xd4a96a, 0.8));

const sun = new THREE.DirectionalLight(0xfff0cc, 2.8);
sun.position.set(40, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(4096);
sun.shadow.camera.near   =   1;
sun.shadow.camera.far    = 250;
sun.shadow.camera.left   = -100;
sun.shadow.camera.right  =  100;
sun.shadow.camera.top    =  100;
sun.shadow.camera.bottom = -100;
scene.add(sun);

/* ════════════════════════════════════════════
   VILLE DE GAO — Génération procédurale
   Compounds en banco, arbres sahéliens,
   place centrale réservée au Tombeau des Askia
════════════════════════════════════════════ */

/* Matériaux */
const mSol   = new THREE.MeshStandardMaterial({ color:0xd4a96a, roughness:0.97 });
const mBanco = new THREE.MeshStandardMaterial({ color:0xc19055, roughness:0.93 });
const mBanc2 = new THREE.MeshStandardMaterial({ color:0xac7a3e, roughness:0.92 });
const mToit  = new THREE.MeshStandardMaterial({ color:0xba8845, roughness:0.88 });
const mFeuil = new THREE.MeshStandardMaterial({ color:0x2e7020, roughness:0.85 });
const mTronc = new THREE.MeshStandardMaterial({ color:0x4a2e10, roughness:0.95 });
const mPlaza = new THREE.MeshStandardMaterial({ color:0xc8956a, roughness:0.97 });
const mTomb  = new THREE.MeshStandardMaterial({ color:0xb87040, roughness:0.85 });

/* Sol sablonneux */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), mSol);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* Générateur pseudo-aléatoire déterministe */
let _s = 2317;
function rng() {
  _s = (_s * 1664525 + 1013904223) & 0x7fffffff;
  return _s / 0x7fffffff;
}

/* Helpers géométrie */
function addBox(w, h, d, x, z, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, h / 2, z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
}

function addTree(x, z) {
  const th = 2.0 + rng() * 2.5;
  const cr = 1.0 + rng() * 1.8;
  addBox(0.28, th, 0.28, x, z, mTronc);
  const crown = new THREE.Mesh(new THREE.SphereGeometry(cr, 8, 6), mFeuil);
  crown.position.set(x, th + cr * 0.6, z);
  crown.castShadow = true;
  scene.add(crown);
}

/* Paramètres de la grille */
const BS   = 22;    // taille d'un bloc (m)
const RUE  = 5;     // largeur des rues (m)
const CELL = BS + RUE;
const GRID = 10;    // 10×10 blocs
const OFF  = -(GRID * CELL) / 2;

/* Zone centrale réservée au Tombeau : blocs 4 et 5 (0-indexé) */
const T0 = 4, T1 = 5;

for (let gx = 0; gx < GRID; gx++) {
  for (let gz = 0; gz < GRID; gz++) {
    const cx = OFF + gx * CELL + BS / 2;
    const cz = OFF + gz * CELL + BS / 2;

    /* Place du Tombeau : laisser libre */
    if (gx >= T0 && gx <= T1 && gz >= T0 && gz <= T1) continue;

    /* ─ Murs du compound ─ */
    const wh  = 2.2 + rng() * 1.0;
    const wt  = 0.42;
    const mat = rng() > 0.45 ? mBanco : mBanc2;

    addBox(BS, wh, wt, cx, cz - BS/2, mat);
    addBox(BS, wh, wt, cx, cz + BS/2, mat);
    addBox(wt, wh, BS, cx - BS/2, cz, mat);
    addBox(wt, wh, BS, cx + BS/2, cz, mat);

    /* ─ Bâtiments intérieurs ─ */
    const nb = 1 + Math.floor(rng() * 3);
    for (let i = 0; i < nb; i++) {
      const bw = 4 + rng() * 7;
      const bd = 4 + rng() * 6;
      const bh = 2.6 + rng() * 2.8;
      const bx = cx + (rng() - 0.5) * (BS - bw - 2);
      const bz = cz + (rng() - 0.5) * (BS - bd - 2);
      const bm = rng() > 0.5 ? mBanco : mBanc2;
      addBox(bw, bh, bd, bx, bz, bm);
      /* toit plat */
      const roof = new THREE.Mesh(new THREE.BoxGeometry(bw + 0.3, 0.18, bd + 0.3), mToit);
      roof.position.set(bx, bh + 0.09, bz);
      roof.receiveShadow = true;
      scene.add(roof);
    }

    /* ─ Arbre dans le compound (65 %) ─ */
    if (rng() > 0.35)
      addTree(cx + (rng()-0.5)*(BS-5), cz + (rng()-0.5)*(BS-5));
  }
}

/* Arbres dans les rues */
for (let i = 0; i < 140; i++) {
  const tx = OFF + rng() * GRID * CELL;
  const tz = OFF + rng() * GRID * CELL;
  addTree(tx, tz);
}

/* ── Place du Tombeau des Askia ── */
const tombX = OFF + T0 * CELL + CELL;   // centre de la zone 2×2
const tombZ = OFF + T0 * CELL + CELL;

/* Sol de la place légèrement différent */
const plaza = new THREE.Mesh(new THREE.PlaneGeometry(CELL*2+2, CELL*2+2), mPlaza);
plaza.rotation.x = -Math.PI / 2;
plaza.position.set(tombX, 0.02, tombZ);
plaza.receiveShadow = true;
scene.add(plaza);

/* Murs d'enceinte de la place */
const pSize = CELL * 2;
const pwh   = 1.8, pwt = 0.5;
addBox(pSize, pwh, pwt, tombX, tombZ - pSize/2, mTomb);
addBox(pSize, pwh, pwt, tombX, tombZ + pSize/2, mTomb);
addBox(pwt, pwh, pSize, tombX - pSize/2, tombZ, mTomb);
addBox(pwt, pwh, pSize, tombX + pSize/2, tombZ, mTomb);

/* Placeholder : socle du Tombeau */
const socle = new THREE.Mesh(
  new THREE.BoxGeometry(10, 0.6, 10), mTomb
);
socle.position.set(tombX, 0.3, tombZ);
socle.receiveShadow = true;
scene.add(socle);

/* Label 3D — panneau indicatif */
const panMat = new THREE.MeshStandardMaterial({ color:0x8b5e20 });
const panneau = new THREE.Mesh(new THREE.BoxGeometry(6, 1.2, 0.1), panMat);
panneau.position.set(tombX, 2.8, tombZ - 6);
scene.add(panneau);

/* ══════════════════════════════════════════
   CONTRÔLES — joystick tactile + clavier
══════════════════════════════════════════ */
const keys = { up:false, down:false, left:false, right:false };

/* ── Clavier ── */
const KMAP = { ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down', ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right' };
window.addEventListener('keydown', e => { const k=KMAP[e.code]; if(k){ e.preventDefault(); keys[k]=true;  } });
window.addEventListener('keyup',   e => { const k=KMAP[e.code]; if(k){ keys[k]=false; } });

/* ── Joystick tactile ── */
const jZone   = document.getElementById('joystick-zone');
const jHandle = document.getElementById('joystick-handle');
const J_RADIUS = 38;   // débattement max du handle en px
const J_DEAD   = 0.25; // zone morte (25 % du rayon)

let jActive = false;
let jId     = null;
let jCx     = 0, jCy = 0;  // centre de la zone
let jDx     = 0, jDy = 0;  // direction normalisée [-1, 1]

function jStart(cx, cy, tx, ty) {
  jActive = true;
  jCx = cx; jCy = cy;
  jMove(tx, ty);
}

function jMove(tx, ty) {
  if (!jActive) return;
  let dx = tx - jCx;
  let dy = ty - jCy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const clamped = Math.min(dist, J_RADIUS);
  const nx = dist > 0 ? dx/dist : 0;
  const ny = dist > 0 ? dy/dist : 0;

  /* déplacer le handle visuellement */
  jHandle.style.transform = `translate(calc(-50% + ${nx*clamped}px), calc(-50% + ${ny*clamped}px))`;

  /* convertir en directions */
  jDx = Math.abs(nx) > J_DEAD ? nx : 0;
  jDy = Math.abs(ny) > J_DEAD ? ny : 0;
  keys.up    = jDy < -J_DEAD;
  keys.down  = jDy >  J_DEAD;
  keys.left  = jDx < -J_DEAD;
  keys.right = jDx >  J_DEAD;
}

function jEnd() {
  jActive = false;
  jHandle.style.transform = 'translate(-50%, -50%)';
  keys.up = keys.down = keys.left = keys.right = false;
}

/* Touch */
jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = jZone.getBoundingClientRect();
  const t = e.changedTouches[0];
  jId = t.identifier;
  jStart(r.left + r.width/2, r.top + r.height/2, t.clientX, t.clientY);
}, { passive:false });

window.addEventListener('touchmove', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === jId) { e.preventDefault(); jMove(t.clientX, t.clientY); break; }
  }
}, { passive:false });

window.addEventListener('touchend',    e => { for (const t of e.changedTouches) if (t.identifier === jId) jEnd(); });
window.addEventListener('touchcancel', e => { for (const t of e.changedTouches) if (t.identifier === jId) jEnd(); });

/* Souris (desktop) */
jZone.addEventListener('mousedown', e => {
  const r = jZone.getBoundingClientRect();
  jStart(r.left + r.width/2, r.top + r.height/2, e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => { if (jActive) jMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   () => { if (jActive) jEnd(); });

/* ── État personnage ── */
let model     = null;
let mixer     = null;
let walkClip  = null;
let bones     = {};
let idleTimer = 0;
let isWalking = false;
let fadeOut   = false;   // vrai pendant le fondu walk→idle
let fadeTimer = 0;
const FADE_DUR = 0.5;   // durée du fondu en secondes
const status  = document.getElementById('ui-status');

/* ── Chargement ── */
const draco = new DRACOLoader();
draco.setDecoderPath(BASE + 'assets/draco/');

const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

loader.load(
  BASE + 'assets/3d/char1_walking.glb',

  (gltf) => {
    model = gltf.scene;
    model.traverse(o => {
      if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; }
      if (o.isBone) { bones[o.name] = o; }
    });
    /* Positionner le personnage à l'entrée de la place du Tombeau */
    model.position.set(tombX, 0, tombZ + pSize / 2 + 3);
    model.rotation.y = Math.PI;
    scene.add(model);

    /* pose de repos pour l'idle */
    model.traverse(o => { if (o.isBone) o.userData.rest = o.quaternion.clone(); });

    /* animation walk */
    if (gltf.animations && gltf.animations.length > 0) {
      mixer    = new THREE.AnimationMixer(model);
      walkClip = mixer.clipAction(gltf.animations[0]);
      walkClip.setLoop(THREE.LoopRepeat, Infinity);
      walkClip.clampWhenFinished = false;
    }

    document.getElementById('screen-load').classList.add('hide');
  },

  xhr => {
    if (xhr.total > 0)
      document.getElementById('load-bar').style.width =
        Math.round(xhr.loaded / xhr.total * 100) + '%';
  },

  err => fatal('Impossible de charger char1_walking.glb\n' + (err?.message ?? String(err)))
);

/* ══════════════════════════════════════════
   ANIMATION IDLE PROCÉDURALE
   Bras relâchés le long du corps +
   tête qui tourne lentement gauche/droite
══════════════════════════════════════════ */
const _Q = new THREE.Quaternion();
const _E = new THREE.Euler();
const D  = g => g * Math.PI / 180;

function applyIdle(t) {
  const br  = Math.PI*2 * t / 5.0;   // respiration 5 s
  const lk  = Math.PI*2 * t / 6.0;   // rotation tête gauche/droite 6 s

  function rot(name, rx, ry, rz) {
    const b = bones[name];
    if (!b || !b.userData.rest) return;
    _E.set(rx, ry, rz, 'XYZ');
    _Q.setFromEuler(_E);
    b.quaternion.copy(b.userData.rest).multiply(_Q);
  }

  /* Bassin : micro-respiration, quasi immobile */
  rot('Hips',   D(0.2)*Math.sin(br), 0, 0);

  /* Colonne : légère expansion poitrine à l'inspiration */
  rot('Spine',  D(0.5)*Math.sin(br), 0, 0);
  rot('Spine1', D(0.4)*Math.sin(br), 0, 0);
  rot('Spine2', D(0.3)*Math.sin(br), 0, 0);

  /* Cou : accompagne légèrement la tête */
  rot('Neck', 0, D(10)*Math.sin(lk) * 0.3, 0);

  /* Tête : tourne sur l'axe Y (gauche/droite) — 30° max */
  rot('Head', 0, D(30)*Math.sin(lk), 0);

  /* Bras gauche : relâché, pendant naturellement */
  rot('LeftShoulder', 0, 0, 0);
  rot('LeftArm',     D(1)*Math.sin(br), 0, 0);
  rot('LeftForeArm', D(2), 0, 0);
  rot('LeftHand',    0, 0, 0);

  /* Bras droit : relâché, pendant naturellement */
  rot('RightShoulder', 0, 0, 0);
  rot('RightArm',     D(1)*Math.sin(br + Math.PI), 0, 0);
  rot('RightForeArm', D(2), 0, 0);
  rot('RightHand',    0, 0, 0);
}

/* ── Caméra 3e personne ── */
const camOff = new THREE.Vector3();
const camTgt = new THREE.Vector3();

function updateCamera() {
  if (!model) return;
  const ry = model.rotation.y;
  camOff.set(
    model.position.x - Math.sin(ry) * 3.8,
    model.position.y + 2.0,
    model.position.z - Math.cos(ry) * 3.8
  );
  camera.position.lerp(camOff, 0.08);
  camTgt.set(model.position.x, model.position.y + 1.0, model.position.z);
  camera.lookAt(camTgt);
  sun.target.position.copy(model.position);
  sun.target.updateMatrixWorld();
}

/* ── Boucle principale ── */
const clock = new THREE.Clock();

(function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!model) { renderer.render(scene, camera); return; }

  const moving = keys.up || keys.down || keys.left || keys.right;

  /* déplacement — modèle face +Z (Blender), inverser les signes */
  if (keys.left)  model.rotation.y -= 2.2 * dt;
  if (keys.right) model.rotation.y += 2.2 * dt;
  if (keys.up) {
    model.position.x += Math.sin(model.rotation.y) * 2.3 * dt;
    model.position.z += Math.cos(model.rotation.y) * 2.3 * dt;
  }
  if (keys.down) {
    model.position.x -= Math.sin(model.rotation.y) * 2.3 * dt;
    model.position.z -= Math.cos(model.rotation.y) * 2.3 * dt;
  }

  /* transition walk ↔ idle */
  if (moving && !isWalking) {
    /* démarrage marche : annule le fondu si en cours */
    isWalking = true;
    fadeOut   = false;
    idleTimer = 0;
    if (walkClip) walkClip.reset().play();
    status.textContent = 'MARCHE';
  } else if (!moving && isWalking) {
    /* arrêt marche : lance le fondu, ne stop pas abruptement */
    isWalking = false;
    fadeOut   = true;
    fadeTimer = 0;
    if (walkClip) walkClip.fadeOut(FADE_DUR);
    status.textContent = 'IDLE';
  }

  /* animation */
  if (isWalking) {
    /* marche : le mixer contrôle les bones */
    if (mixer) mixer.update(dt);
  } else if (fadeOut) {
    /* fondu : le mixer continue jusqu'à la fin du fadeOut */
    fadeTimer += dt;
    if (mixer) mixer.update(dt);
    if (fadeTimer >= FADE_DUR) {
      fadeOut = false;
      if (walkClip) walkClip.stop();
    }
  } else {
    /* idle : procédural contrôle les bones */
    idleTimer += dt;
    applyIdle(idleTimer);
  }

  updateCamera();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
