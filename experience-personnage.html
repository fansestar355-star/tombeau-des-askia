<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnage — Askia Mohamed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0f1a;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }

    #canvas-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Retour */
    #btn-back {
      position: fixed;
      top: 24px; left: 24px;
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(167,139,250,0.45);
      background: rgba(11,15,26,0.7);
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    #btn-back:hover {
      background: rgba(108,99,255,0.25);
      border-color: #a78bfa;
      color: #fff;
    }

    /* Titre */
    #title-hud {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #f9d58b;
      text-shadow: 0 0 18px rgba(249,213,139,0.35);
    }

    /* Contrôles clavier */
    #controls-hud {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #controls-hud .row {
      display: flex;
      gap: 6px;
    }
    .key {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1.5px solid rgba(167,139,250,0.35);
      background: rgba(11,15,26,0.65);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(167,139,250,0.7);
      transition: all 0.15s ease;
    }
    .key.active {
      border-color: #a78bfa;
      background: rgba(108,99,255,0.3);
      color: #fff;
      box-shadow: 0 0 14px rgba(108,99,255,0.4);
    }
    .key svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Vitesse info */
    #info-hud {
      position: fixed;
      bottom: 120px;
      right: 28px;
      text-align: right;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      line-height: 1.8;
    }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0f1a;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(167,139,250,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #loading-text {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.6);
    }

    /* ── Joystick ── */
    #joystick-zone {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 130px;
      z-index: 10;
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.2);
      background: rgba(11,15,26,0.45);
      backdrop-filter: blur(10px);
      touch-action: none; user-select: none;
      pointer-events: all;
    }
    #joystick-handle {
      position: absolute; top: 50%; left: 50%;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, rgba(255,220,100,0.9), rgba(200,140,0,0.7));
      border: 2px solid rgba(255,220,100,0.5);
      box-shadow: 0 0 18px rgba(255,200,0,0.3);
      transform: translate(-50%,-50%);
      transition: transform 0.08s ease;
      pointer-events: none;
    }
    #hint {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(167,139,250,0.25); z-index: 10; pointer-events: none;
      white-space: nowrap;
    }
    /* Cacher les touches flèches sur mobile */
    @media (max-width: 768px) { #controls-hud { display: none; } }

  </style>
</head>

<script type="importmap">
{
  "imports": {
    "three":              "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky }           from 'three/addons/objects/Sky.js';

/* ═══════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════ */
const WALK_SPEED   = 2.2;   // m/s
const TURN_SPEED   = 2.0;   // rad/s
const CAM_DISTANCE = 3.5;
const CAM_HEIGHT   = 1.8;
const MODEL_PATH   = 'assets/3d/char1_walking.glb';
const DRACO_PATH   = new URL('.', document.baseURI).href + 'assets/draco/';

/* ═══════════════════════════════════════════
   SCÈNE
═══════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog   = new THREE.Fog(0xd4b87a, 120, 380);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.05, 500);
camera.position.set(0, 2.5, 5);

/* ══════════════════════════════════════════
   CIEL PHYSIQUE — Sky shader
══════════════════════════════════════════ */
const sky = new Sky();
sky.scale.setScalar(10000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value       = 2.5;
skyU['rayleigh'].value        = 1.2;
skyU['mieCoefficient'].value  = 0.003;
skyU['mieDirectionalG'].value = 0.82;
const sunVec = new THREE.Vector3();
sunVec.setFromSphericalCoords(1,
  THREE.MathUtils.degToRad(90 - 50),  // élévation 50°
  THREE.MathUtils.degToRad(195)       // azimut
);
skyU['sunPosition'].value.copy(sunVec);

/* ══════════════════════════════════════════
   LUMIÈRES DÉSERT
══════════════════════════════════════════ */
scene.add(new THREE.HemisphereLight(0x87ceeb, 0xc8943a, 0.55));

const sun = new THREE.DirectionalLight(0xfff0cc, 3.8);
sun.position.set(-45, 80, 35);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(4096);
sun.shadow.camera.near   =  1;
sun.shadow.camera.far    = 250;
sun.shadow.camera.left   = sun.shadow.camera.bottom = -60;
sun.shadow.camera.right  = sun.shadow.camera.top    =  60;
scene.add(sun);

/* ══════════════════════════════════════════
   TERRAIN DUNAIRE PROCÉDURAL
   Vertex colors : crêtes claires / creux dorés
══════════════════════════════════════════ */
const T_SIZE = 300, T_SEGS = 160;
const terrGeo = new THREE.PlaneGeometry(T_SIZE, T_SIZE, T_SEGS, T_SEGS);
terrGeo.rotateX(-Math.PI / 2);

/* Fonction hauteur dune réutilisable pour la végétation */
function duneH(x, z) {
  const r = Math.sqrt(x*x + z*z);
  const flat = Math.max(0, 1.0 - r / 28);
  let h = 0;
  h += 9.5 * Math.sin(x*0.026 + 0.40) * Math.cos(z*0.021 + 1.10);
  h += 7.0 * Math.cos(x*0.017 + 2.30) * Math.sin(z*0.029 + 0.70);
  h += 4.5 * Math.sin(x*0.043 + 1.80) * Math.cos(z*0.038 + 2.50);
  h += 2.5 * Math.cos(x*0.068 + 0.90) * Math.sin(z*0.052 + 1.40);
  h += 1.2 * Math.sin(x*0.110 + 3.10) * Math.cos(z*0.090 + 0.60);
  h = Math.max(0, h) * 0.78;
  h += 0.055 * Math.sin(x * 3.1 + z * 2.0);  // rides de sable
  return h * (1.0 - flat * 0.93);
}

const tPos = terrGeo.attributes.position;
const vertColors = new Float32Array(tPos.count * 3);

for (let i = 0; i < tPos.count; i++) {
  const x = tPos.getX(i), z = tPos.getZ(i);
  const h = duneH(x, z);
  tPos.setY(i, h);

  /* Gradient couleur : crête = sable clair, creux = ocre chaud */
  const t = Math.min(1.0, h / 7.0);
  vertColors[i*3]   = 0.68 + t * 0.18;   // R
  vertColors[i*3+1] = 0.50 + t * 0.14;   // G
  vertColors[i*3+2] = 0.18 + t * 0.10;   // B
}
terrGeo.setAttribute('color', new THREE.BufferAttribute(vertColors, 3));
terrGeo.computeVertexNormals();

const terrMat = new THREE.MeshStandardMaterial({
  vertexColors: true,
  roughness: 0.97,
  metalness: 0.00,
});
const terrain = new THREE.Mesh(terrGeo, terrMat);
terrain.receiveShadow = true;
scene.add(terrain);

/* ══════════════════════════════════════════
   VÉGÉTATION DÉSERTIQUE
   Petits buissons épineux saharo-sahéliens
══════════════════════════════════════════ */
let _rs = 5391;
const drng = () => { _rs=(_rs*1664525+1013904223)&0x7fffffff; return _rs/0x7fffffff; };

const BUSH_COLS = [0x4a3a14, 0x3e3010, 0x58461a, 0x342a0c, 0x504018, 0x6a5420];

function addBush(x, z) {
  const ground0 = duneH(x, z);
  const stems = 1 + Math.floor(drng() * 3);
  for (let s = 0; s < stems; s++) {
    const r  = 0.07 + drng() * 0.16;
    const ox = (drng()-0.5) * 0.22, oz = (drng()-0.5) * 0.18;
    const col = BUSH_COLS[Math.floor(drng() * BUSH_COLS.length)];
    const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.98 });
    const geo = new THREE.SphereGeometry(r, 5, 3);
    const b = new THREE.Mesh(geo, mat);
    b.scale.set(1.1 + drng()*0.5, 0.5 + drng()*0.35, 1.0 + drng()*0.4);
    b.position.set(x+ox, ground0 + r*0.35, z+oz);
    b.castShadow = true;
    scene.add(b);
  }
  /* Tige centrale fine */
  const sh = 0.18 + drng()*0.25;
  const stMat = new THREE.MeshStandardMaterial({ color:0x3a2e0a, roughness:0.99 });
  const stem  = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.018, sh, 5), stMat);
  stem.position.set(x, ground0 + sh/2, z);
  scene.add(stem);
}

for (let i = 0; i < 110; i++) {
  const ang  = drng() * Math.PI * 2;
  const dist = 8 + drng() * 120;
  addBush(Math.cos(ang)*dist, Math.sin(ang)*dist);
}

/* ══════════════════════════════════════════
   PARTICULES DE SABLE — Vent du désert
   Couche 1 : traînées ras du sol  (rapides, fines)
   Couche 2 : poussière en altitude (lente, diffuse)
══════════════════════════════════════════ */
const SAND1_N = 1400;
const s1Pos = new Float32Array(SAND1_N * 3);
const s1Vel = new Float32Array(SAND1_N * 3);

for (let i = 0; i < SAND1_N; i++) {
  s1Pos[i*3]   = (Math.random() - 0.5) * 110;
  s1Pos[i*3+1] = Math.random() * 1.4;
  s1Pos[i*3+2] = (Math.random() - 0.5) * 110;
  s1Vel[i*3]   = 4.5 + Math.random() * 5.5;
  s1Vel[i*3+1] = (Math.random() - 0.5) * 0.12;
  s1Vel[i*3+2] = (Math.random() - 0.5) * 1.8;
}
const s1Geo = new THREE.BufferGeometry();
s1Geo.setAttribute('position', new THREE.BufferAttribute(s1Pos, 3));
const s1Mat = new THREE.PointsMaterial({
  color: 0xddb85a, size: 0.045, transparent: true, opacity: 0.55,
  sizeAttenuation: true, depthWrite: false,
});
scene.add(new THREE.Points(s1Geo, s1Mat));

const SAND2_N = 700;
const s2Pos = new Float32Array(SAND2_N * 3);
const s2Vel = new Float32Array(SAND2_N * 3);

for (let i = 0; i < SAND2_N; i++) {
  s2Pos[i*3]   = (Math.random() - 0.5) * 150;
  s2Pos[i*3+1] = 1.5 + Math.random() * 9.5;
  s2Pos[i*3+2] = (Math.random() - 0.5) * 150;
  s2Vel[i*3]   = 1.2 + Math.random() * 2.0;
  s2Vel[i*3+1] = (Math.random() - 0.5) * 0.06;
  s2Vel[i*3+2] = (Math.random() - 0.5) * 0.5;
}
const s2Geo = new THREE.BufferGeometry();
s2Geo.setAttribute('position', new THREE.BufferAttribute(s2Pos, 3));
const s2Mat = new THREE.PointsMaterial({
  color: 0xc9a04e, size: 0.14, transparent: true, opacity: 0.18,
  sizeAttenuation: true, depthWrite: false,
});
scene.add(new THREE.Points(s2Geo, s2Mat));

let fogTime = 0;

/* ══════════════════════════════════════════
   AUDIO — Pas dans le sable (Web Audio API)
══════════════════════════════════════════ */
let audioCtx  = null;
let stepTimer = 0;
const STEP_INTERVAL = 0.42;

function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

function playSandStep() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume(); return; }
  const now = audioCtx.currentTime;
  const dur  = 0.068;

  const len = Math.ceil(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch  = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;

  const src  = audioCtx.createBufferSource();
  src.buffer = buf;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1100 + Math.random() * 700;
  bp.Q.value = 0.6;

  const ls = audioCtx.createBiquadFilter();
  ls.type = 'lowshelf';
  ls.frequency.value = 180;
  ls.gain.value = 7;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.20, now + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

  src.connect(bp);
  bp.connect(ls);
  ls.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(now);
  src.stop(now + dur + 0.01);
}

['keydown', 'touchstart', 'mousedown'].forEach(ev =>
  document.addEventListener(ev, initAudio, { once: true })
);

/* ═══════════════════════════════════════════
   CHARGEMENT DU MODÈLE
═══════════════════════════════════════════ */
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath(DRACO_PATH);

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer      = null;
let walkAction = null;
let character  = null;
let bones      = {};
let isWalking  = false;
let fadeOut    = false;
let fadeTimer  = 0;
let idleTimer  = 0;
const FADE_DUR = 0.5;

/* Idle procédural */
const _Q = new THREE.Quaternion();
const _E = new THREE.Euler();
const D  = g => g * Math.PI / 180;

function applyIdle(t) {
  const br = Math.PI*2 * t / 5.0;
  const lk = Math.PI*2 * t / 6.0;
  function rot(name, rx, ry, rz) {
    const b = bones[name];
    if (!b || !b.userData.rest) return;
    _E.set(rx, ry, rz, 'XYZ');
    _Q.setFromEuler(_E);
    b.quaternion.copy(b.userData.rest).multiply(_Q);
  }
  rot('Hips',          D(0.2)*Math.sin(br), 0, 0);
  rot('Spine',         D(0.5)*Math.sin(br), 0, 0);
  rot('Spine1',        D(0.4)*Math.sin(br), 0, 0);
  rot('Spine2',        D(0.3)*Math.sin(br), 0, 0);
  rot('Neck',          0, D(10)*Math.sin(lk)*0.3, 0);
  rot('Head',          0, D(30)*Math.sin(lk), 0);
  rot('LeftShoulder',  0, 0, 0);
  rot('LeftArm',       D(1)*Math.sin(br), 0, 0);
  rot('LeftForeArm',   D(2), 0, 0);
  rot('LeftHand',      0, 0, 0);
  rot('RightShoulder', 0, 0, 0);
  rot('RightArm',      D(1)*Math.sin(br + Math.PI), 0, 0);
  rot('RightForeArm',  D(2), 0, 0);
  rot('RightHand',     0, 0, 0);
}

gltfLoader.load(
  MODEL_PATH,
  (gltf) => {
    character = gltf.scene;

    character.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow    = true;
        obj.receiveShadow = true;
      }
    });

    // Positionner au centre, dos vers la caméra (rotation 180° = face vers -Z)
    character.position.set(0, 0, 0);
    character.rotation.y = Math.PI;
    scene.add(character);

    // Collecter les bones + pose de repos pour l'idle
    character.traverse(o => {
      if (o.isBone) { bones[o.name] = o; o.userData.rest = o.quaternion.clone(); }
    });

    // Animation mixer
    mixer = new THREE.AnimationMixer(character);
    if (gltf.animations.length > 0) {
      walkAction = mixer.clipAction(gltf.animations[0]);
      walkAction.setLoop(THREE.LoopRepeat);
      walkAction.clampWhenFinished = false;
    }

    // Masquer le loading
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('info-anim').textContent = 'Animation : idle';
  },
  (xhr) => {
    const pct = Math.round((xhr.loaded / xhr.total) * 100);
    document.getElementById('loading-bar').style.width = pct + '%';
    document.getElementById('loading-text').textContent = `Chargement… ${pct}%`;
  },
  (err) => {
    document.getElementById('loading-text').textContent = 'Erreur de chargement : ' + err.message;
    console.error(err);
  }
);

/* ═══════════════════════════════════════════
   CLAVIER
═══════════════════════════════════════════ */
const keys = { up: false, down: false, left: false, right: false };
const keyMap = {
  ArrowUp:    'up',   KeyW: 'up',
  ArrowDown:  'down', KeyS: 'down',
  ArrowLeft:  'left', KeyA: 'left',
  ArrowRight: 'right',KeyD: 'right',
};

const keyEls = {
  up:    document.getElementById('key-up'),
  down:  document.getElementById('key-down'),
  left:  document.getElementById('key-left'),
  right: document.getElementById('key-right'),
};

window.addEventListener('keydown', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = true; keyEls[k].classList.add('active'); e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = false; keyEls[k].classList.remove('active'); }
});

/* ═══════════════════════════════════════════
   JOYSTICK TACTILE
═══════════════════════════════════════════ */
const jZone   = document.getElementById('joystick-zone');
const jHandle = document.getElementById('joystick-handle');
const J_RADIUS = 38, J_DEAD = 0.25;
let jActive = false, jId = null, jCx = 0, jCy = 0;

function jStart(cx, cy, tx, ty) { jActive=true; jCx=cx; jCy=cy; jMove(tx,ty); }
function jMove(tx, ty) {
  if (!jActive) return;
  const dx=tx-jCx, dy=ty-jCy, dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,J_RADIUS);
  const nx=dist>0?dx/dist:0, ny=dist>0?dy/dist:0;
  jHandle.style.transform=`translate(calc(-50% + ${nx*cl}px), calc(-50% + ${ny*cl}px))`;
  keys.up    = ny < -J_DEAD;
  keys.down  = ny >  J_DEAD;
  keys.left  = nx < -J_DEAD;
  keys.right = nx >  J_DEAD;
}
function jEnd() {
  jActive=false;
  jHandle.style.transform='translate(-50%,-50%)';
  keys.up=keys.down=keys.left=keys.right=false;
}
jZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=jZone.getBoundingClientRect(), t=e.changedTouches[0];
  jId=t.identifier; jStart(r.left+r.width/2, r.top+r.height/2, t.clientX, t.clientY);
},{passive:false});
window.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches) if(t.identifier===jId){e.preventDefault();jMove(t.clientX,t.clientY);break;}
},{passive:false});
window.addEventListener('touchend',    e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
window.addEventListener('touchcancel', e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
jZone.addEventListener('mousedown', e=>{
  const r=jZone.getBoundingClientRect();
  jStart(r.left+r.width/2, r.top+r.height/2, e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => { if (jActive) jMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   () => { if (jActive) jEnd(); });

/* ═══════════════════════════════════════════
   CONTRÔLE CAMÉRA — OrbitControls complet
   Rotation · Zoom · Vertical · Tactile
═══════════════════════════════════════════ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.07;
controls.minDistance      = 1.0;
controls.maxDistance      = 60;
controls.maxPolarAngle    = Math.PI / 2 - 0.01;
controls.enablePan        = false;
controls.rotateSpeed      = 0.85;
controls.zoomSpeed        = 1.2;

/* La caméra suit le personnage en restant à l'angle choisi */
function updateCamera() {
  if (!character) {
    controls.update();
    return;
  }
  const tgt = new THREE.Vector3(
    character.position.x,
    character.position.y + 0.9,
    character.position.z
  );
  /* Décaler la caméra avec le personnage sans changer l'orbite */
  const offset = camera.position.clone().sub(controls.target);
  controls.target.lerp(tgt, 0.12);
  camera.position.copy(controls.target).add(offset);
  controls.update();
}

/* ═══════════════════════════════════════════
   BOUCLE PRINCIPALE
═══════════════════════════════════════════ */
const clock = new THREE.Clock();
const infoPos  = document.getElementById('info-pos');
const infoAnim = document.getElementById('info-anim');

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (character) {
    let moving = false;

    // Rotation
    if (keys.left)  character.rotation.y += TURN_SPEED * dt;
    if (keys.right) character.rotation.y -= TURN_SPEED * dt;

    // Déplacement avant/arrière
    if (keys.up) {
      character.position.x += Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z += Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }
    if (keys.down) {
      character.position.x -= Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z -= Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }

    // Coller le personnage sur le terrain
    character.position.y = duneH(character.position.x, character.position.z);

    // Transition walk ↔ idle avec fondu 0.5s
    if (moving && !isWalking) {
      isWalking = true; fadeOut = false; idleTimer = 0;
      if (walkAction) walkAction.reset().play();
      infoAnim.textContent = 'Animation : marche';
    } else if (!moving && isWalking) {
      isWalking = false; fadeOut = true; fadeTimer = 0;
      if (walkAction) walkAction.fadeOut(FADE_DUR);
      infoAnim.textContent = 'Animation : idle';
    }

    // Animation
    if (isWalking) {
      if (mixer) mixer.update(dt);
    } else if (fadeOut) {
      fadeTimer += dt;
      if (mixer) mixer.update(dt);
      if (fadeTimer >= FADE_DUR) { fadeOut = false; if (walkAction) walkAction.stop(); }
    } else {
      idleTimer += dt;
      applyIdle(idleTimer);
    }

    // Info position
    infoPos.textContent = `Position : ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;

    // ── Pas dans le sable ──────────────────────
    if (isWalking) {
      stepTimer += dt;
      if (stepTimer >= STEP_INTERVAL) {
        stepTimer -= STEP_INTERVAL;
        playSandStep();
      }
    } else {
      stepTimer = STEP_INTERVAL * 0.6;
    }
  }

  // ── Particules de sable + brouillard ─────────
  fogTime += dt;
  const gust = 0.5 + 0.4 * Math.sin(fogTime * 0.09) + 0.15 * Math.sin(fogTime * 0.27);
  scene.fog.near = 55  + gust * 65;
  scene.fog.far  = 160 + gust * 190;

  const cx = camera.position.x, cz = camera.position.z;
  const p1 = s1Geo.attributes.position;
  for (let i = 0; i < SAND1_N; i++) {
    p1.array[i*3]   += s1Vel[i*3]   * dt;
    p1.array[i*3+1] += s1Vel[i*3+1] * dt;
    p1.array[i*3+2] += s1Vel[i*3+2] * dt;
    if (p1.array[i*3]   - cx >  55) p1.array[i*3]   = cx - 55 + Math.random() * 4;
    if (p1.array[i*3]   - cx < -55) p1.array[i*3]   = cx + 55 - Math.random() * 4;
    if (p1.array[i*3+2] - cz >  55) p1.array[i*3+2] = cz - 55 + Math.random() * 4;
    if (p1.array[i*3+2] - cz < -55) p1.array[i*3+2] = cz + 55 - Math.random() * 4;
    if (p1.array[i*3+1] < -0.3 || p1.array[i*3+1] > 1.6) p1.array[i*3+1] = Math.random() * 1.4;
  }
  p1.needsUpdate = true;

  const p2 = s2Geo.attributes.position;
  for (let i = 0; i < SAND2_N; i++) {
    p2.array[i*3]   += s2Vel[i*3]   * dt;
    p2.array[i*3+1] += s2Vel[i*3+1] * dt;
    p2.array[i*3+2] += s2Vel[i*3+2] * dt;
    if (p2.array[i*3]   - cx >  75) p2.array[i*3]   = cx - 75 + Math.random() * 5;
    if (p2.array[i*3]   - cx < -75) p2.array[i*3]   = cx + 75 - Math.random() * 5;
    if (p2.array[i*3+2] - cz >  75) p2.array[i*3+2] = cz - 75 + Math.random() * 5;
    if (p2.array[i*3+2] - cz < -75) p2.array[i*3+2] = cz + 75 - Math.random() * 5;
    if (p2.array[i*3+1] < 0.8 || p2.array[i*3+1] > 12.0) p2.array[i*3+1] = 1.5 + Math.random() * 9.5;
  }
  p2.needsUpdate = true;

  updateCamera();
  renderer.render(scene, camera);
}

animate();

/* ═══════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
