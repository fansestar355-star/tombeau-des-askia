<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnage — Askia Mohamed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0f1a;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }

    #canvas-wrap {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Retour */
    #btn-back {
      position: fixed;
      top: 24px; left: 24px;
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(167,139,250,0.45);
      background: rgba(11,15,26,0.7);
      color: #a78bfa;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    #btn-back:hover {
      background: rgba(108,99,255,0.25);
      border-color: #a78bfa;
      color: #fff;
    }

    /* Titre */
    #title-hud {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #f9d58b;
      text-shadow: 0 0 18px rgba(249,213,139,0.35);
    }

    /* Contrôles clavier */
    #controls-hud {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    #controls-hud .row {
      display: flex;
      gap: 6px;
    }
    .key {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1.5px solid rgba(167,139,250,0.35);
      background: rgba(11,15,26,0.65);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: rgba(167,139,250,0.7);
      transition: all 0.15s ease;
    }
    .key.active {
      border-color: #a78bfa;
      background: rgba(108,99,255,0.3);
      color: #fff;
      box-shadow: 0 0 14px rgba(108,99,255,0.4);
    }
    .key svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Vitesse info */
    #info-hud {
      position: fixed;
      bottom: 120px;
      right: 28px;
      text-align: right;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(148,163,184,0.5);
      line-height: 1.8;
    }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0f1a;
      z-index: 100;
      gap: 20px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(167,139,250,0.15);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #loading-text {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.6);
    }

    /* ── Joystick ── */
    #joystick-zone {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 130px;
      z-index: 10;
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.2);
      background: rgba(11,15,26,0.45);
      backdrop-filter: blur(10px);
      touch-action: none; user-select: none;
      pointer-events: all;
    }
    #joystick-handle {
      position: absolute; top: 50%; left: 50%;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, rgba(255,220,100,0.9), rgba(200,140,0,0.7));
      border: 2px solid rgba(255,220,100,0.5);
      box-shadow: 0 0 18px rgba(255,200,0,0.3);
      transform: translate(-50%,-50%);
      transition: transform 0.08s ease;
      pointer-events: none;
    }
    #hint {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(167,139,250,0.25); z-index: 10; pointer-events: none;
      white-space: nowrap;
    }
    /* Bouton Audio */
    #btn-audio {
      position: fixed;
      top: 24px; right: 24px;
      pointer-events: all;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1.5px solid rgba(249,213,139,0.45);
      background: rgba(11,15,26,0.7);
      color: #f9d58b;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      cursor: pointer;
      z-index: 60;
    }
    #btn-audio:hover {
      background: rgba(249,213,139,0.15);
      box-shadow: 0 0 15px rgba(249,213,139,0.2);
    }
    #btn-audio.playing {
      background: var(--gold);
      color: #0b0f1a;
      animation: audioPulse 2s infinite;
    }
    @keyframes audioPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(249,213,139,0.3); }
      50% { box-shadow: 0 0 25px rgba(249,213,139,0.6); }
    }

    /* Cacher les touches flèches sur mobile */
    @media (max-width: 768px) { #controls-hud { display: none; } }

  </style>
</head>
<body>

<div id="canvas-wrap"></div>

<!-- HUD -->
<div id="hud">
  <a id="btn-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

<script type="importmap">
{
  "imports": {
    "three":              "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }

</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }   from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky }           from 'three/addons/objects/Sky.js';

/* ═══════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════ */
const WALK_SPEED   = 2.2;   // m/s
const TURN_SPEED   = 2.0;   // rad/s
const CAM_DISTANCE = 3.5;
const CAM_HEIGHT   = 1.8;
const MODEL_PATH   = 'assets/3d/char1_walking.glb';
const DRACO_PATH   = new URL('.', document.baseURI).href + 'assets/draco/';

/* ═══════════════════════════════════════════
   SCÈNE
═══════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8a068, 0.005);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.05, 500);
camera.position.set(0, 2.5, 5);

/* ══════════════════════════════════════════
   CIEL PHYSIQUE — Sky shader
══════════════════════════════════════════ */
const sky = new Sky();
sky.scale.setScalar(10000);
scene.add(sky);
const skyU = sky.material.uniforms;
skyU['turbidity'].value       = 2.5;
skyU['rayleigh'].value        = 1.2;
skyU['mieCoefficient'].value  = 0.003;
skyU['mieDirectionalG'].value = 0.82;
const sunVec = new THREE.Vector3();
sunVec.setFromSphericalCoords(1,
  THREE.MathUtils.degToRad(90 - 50),  // élévation 50°
  THREE.MathUtils.degToRad(195)       // azimut
);
skyU['sunPosition'].value.copy(sunVec);

/* ══════════════════════════════════════════
   LUMIÈRES DÉSERT
══════════════════════════════════════════ */
scene.add(new THREE.HemisphereLight(0x87ceeb, 0xc8943a, 0.55));

const sun = new THREE.DirectionalLight(0xfff0cc, 3.8);
sun.position.set(-45, 80, 35);
sun.castShadow = true;
sun.shadow.mapSize.setScalar(4096);
sun.shadow.camera.near   =  1;
sun.shadow.camera.far    = 250;
sun.shadow.camera.left   = sun.shadow.camera.bottom = -60;
sun.shadow.camera.right  = sun.shadow.camera.top    =  60;
scene.add(sun);

/* ══════════════════════════════════════════
   TERRAIN DUNAIRE PROCÉDURAL
   Vertex colors : crêtes claires / creux dorés
══════════════════════════════════════════ */
const T_SIZE = 300, T_SEGS = 160;
const terrGeo = new THREE.PlaneGeometry(T_SIZE, T_SIZE, T_SEGS, T_SEGS);
terrGeo.rotateX(-Math.PI / 2);

/* Fonction hauteur dune réutilisable pour la végétation */
function duneH(x, z) {
  const r = Math.sqrt(x*x + z*z);
  const flat = Math.max(0, 1.0 - r / 28);
  let h = 0;
  h += 9.5 * Math.sin(x*0.026 + 0.40) * Math.cos(z*0.021 + 1.10);
  h += 7.0 * Math.cos(x*0.017 + 2.30) * Math.sin(z*0.029 + 0.70);
  h += 4.5 * Math.sin(x*0.043 + 1.80) * Math.cos(z*0.038 + 2.50);
  h += 2.5 * Math.cos(x*0.068 + 0.90) * Math.sin(z*0.052 + 1.40);
  h += 1.2 * Math.sin(x*0.110 + 3.10) * Math.cos(z*0.090 + 0.60);
  h = Math.max(0, h) * 0.78;
  h += 0.055 * Math.sin(x * 3.1 + z * 2.0);  // rides de sable
  return h * (1.0 - flat * 0.93);
}

const tPos = terrGeo.attributes.position;
const vertColors = new Float32Array(tPos.count * 3);

for (let i = 0; i < tPos.count; i++) {
  const x = tPos.getX(i), z = tPos.getZ(i);
  const h = duneH(x, z);
  tPos.setY(i, h);

  /* Gradient couleur : crête = sable clair, creux = ocre chaud */
  const t = Math.min(1.0, h / 7.0);
  vertColors[i*3]   = 0.68 + t * 0.18;   // R
  vertColors[i*3+1] = 0.50 + t * 0.14;   // G
  vertColors[i*3+2] = 0.18 + t * 0.10;   // B
}
terrGeo.setAttribute('color', new THREE.BufferAttribute(vertColors, 3));
terrGeo.computeVertexNormals();

const terrMat = new THREE.MeshStandardMaterial({
  vertexColors: true,
  roughness: 0.97,
  metalness: 0.00,
});
const terrain = new THREE.Mesh(terrGeo, terrMat);
terrain.receiveShadow = true;
scene.add(terrain);

/* ══════════════════════════════════════════
   VÉGÉTATION DÉSERTIQUE
   Petits buissons épineux saharo-sahéliens
══════════════════════════════════════════ */
let _rs = 5391;
const drng = () => { _rs=(_rs*1664525+1013904223)&0x7fffffff; return _rs/0x7fffffff; };

const BUSH_COLS = [0x4a3a14, 0x3e3010, 0x58461a, 0x342a0c, 0x504018, 0x6a5420];

function addBush(x, z) {
  const ground0 = duneH(x, z);
  const stems = 1 + Math.floor(drng() * 3);
  for (let s = 0; s < stems; s++) {
    const r  = 0.07 + drng() * 0.16;
    const ox = (drng()-0.5) * 0.22, oz = (drng()-0.5) * 0.18;
    const col = BUSH_COLS[Math.floor(drng() * BUSH_COLS.length)];
    const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.98 });
    const geo = new THREE.SphereGeometry(r, 5, 3);
    const b = new THREE.Mesh(geo, mat);
    b.scale.set(1.1 + drng()*0.5, 0.5 + drng()*0.35, 1.0 + drng()*0.4);
    b.position.set(x+ox, ground0 + r*0.35, z+oz);
    b.castShadow = true;
    scene.add(b);
  }
  /* Tige centrale fine */
  const sh = 0.18 + drng()*0.25;
  const stMat = new THREE.MeshStandardMaterial({ color:0x3a2e0a, roughness:0.99 });
  const stem  = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.018, sh, 5), stMat);
  stem.position.set(x, ground0 + sh/2, z);
  scene.add(stem);
}

for (let i = 0; i < 110; i++) {
  const ang  = drng() * Math.PI * 2;
  const dist = 8 + drng() * 120;
  addBush(Math.cos(ang)*dist, Math.sin(ang)*dist);
}

/* ══════════════════════════════════════════
   VENT DE SABLE — 3 couches + vent dynamique
   Grain flou (canvas texture) pour un rendu réaliste
══════════════════════════════════════════ */

/* Texture douce : grain de sable radial */
function mkSandTex(sz) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = sz;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(sz/2, sz/2, 0, sz/2, sz/2, sz/2);
  g.addColorStop(0,    'rgba(255,218,118,1)');
  g.addColorStop(0.30, 'rgba(235,172, 65,0.85)');
  g.addColorStop(0.60, 'rgba(205,140, 45,0.40)');
  g.addColorStop(0.85, 'rgba(175,110, 30,0.12)');
  g.addColorStop(1,    'rgba(150, 90, 20,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, sz, sz);
  return new THREE.CanvasTexture(cv);
}
const texSmall = mkSandTex(32);
const texLarge = mkSandTex(64);

/* ── Couche 1 : sable ras du sol (dense, rapide) ── */
const G_N  = 2200;
const gPos = new Float32Array(G_N * 3);
const gPh  = new Float32Array(G_N); // phase turbulence individuelle

for (let i = 0; i < G_N; i++) {
  gPos[i*3]   = (Math.random() - 0.5) * 90;
  gPos[i*3+1] = Math.random() * 0.55;
  gPos[i*3+2] = (Math.random() - 0.5) * 90;
  gPh[i]      = Math.random() * Math.PI * 2;
}
const gGeo = new THREE.BufferGeometry();
gGeo.setAttribute('position', new THREE.BufferAttribute(gPos, 3));
scene.add(new THREE.Points(gGeo, new THREE.PointsMaterial({
  map: texSmall, size: 0.055, transparent: true, opacity: 0.70,
  sizeAttenuation: true, depthWrite: false, alphaTest: 0.01,
})));

/* ── Couche 2 : tourbillons à mi-hauteur ── */
const M_N  = 900;
const mPos = new Float32Array(M_N * 3);
const mPh  = new Float32Array(M_N);

for (let i = 0; i < M_N; i++) {
  mPos[i*3]   = (Math.random() - 0.5) * 130;
  mPos[i*3+1] = 0.4 + Math.random() * 5.5;
  mPos[i*3+2] = (Math.random() - 0.5) * 130;
  mPh[i]      = Math.random() * Math.PI * 2;
}
const mGeo = new THREE.BufferGeometry();
mGeo.setAttribute('position', new THREE.BufferAttribute(mPos, 3));
scene.add(new THREE.Points(mGeo, new THREE.PointsMaterial({
  map: texSmall, size: 0.14, transparent: true, opacity: 0.28,
  sizeAttenuation: true, depthWrite: false, alphaTest: 0.01,
})));

/* ── Couche 3 : brume de poussière haute (diffuse) ── */
const H_N  = 400;
const hPos = new Float32Array(H_N * 3);
const hPh  = new Float32Array(H_N);

for (let i = 0; i < H_N; i++) {
  hPos[i*3]   = (Math.random() - 0.5) * 200;
  hPos[i*3+1] = 5.0 + Math.random() * 20.0;
  hPos[i*3+2] = (Math.random() - 0.5) * 200;
  hPh[i]      = Math.random() * Math.PI * 2;
}
const hGeo = new THREE.BufferGeometry();
hGeo.setAttribute('position', new THREE.BufferAttribute(hPos, 3));
scene.add(new THREE.Points(hGeo, new THREE.PointsMaterial({
  map: texLarge, size: 0.65, transparent: true, opacity: 0.10,
  sizeAttenuation: true, depthWrite: false, alphaTest: 0.005,
})));

/* Fonctions de vent dynamique (rafales organiques) */
const getWx = t => 5.5 + 2.4*Math.sin(t*0.07) + 1.1*Math.sin(t*0.18) + 0.5*Math.sin(t*0.41);
const getWz = t =>       1.1*Math.sin(t*0.11)  + 0.6*Math.sin(t*0.29);

/* Voile de sable — overlay CSS pulsé */
const sandVeil = document.createElement('div');
sandVeil.style.cssText = [
  'position:fixed','inset:0','pointer-events:none','z-index:6',
  'background:linear-gradient(to top,rgba(190,128,40,0.22) 0%,rgba(175,115,35,0.06) 28%,transparent 55%)',
  'transition:opacity 0.8s ease','opacity:0.4',
].join(';');
document.body.appendChild(sandVeil);

let fogTime = 0;


/* ═══════════════════════════════════════════
   CHARGEMENT DU MODÈLE
═══════════════════════════════════════════ */
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath(DRACO_PATH);

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer      = null;
let walkAction = null;
let character  = null;
let bones      = {};
let isWalking  = false;
let fadeOut    = false;
let fadeTimer  = 0;
let idleTimer  = 0;
const FADE_DUR = 0.5;

/* Idle procédural */
const _Q = new THREE.Quaternion();
const _E = new THREE.Euler();
const D  = g => g * Math.PI / 180;

function applyIdle(t) {
  const br = Math.PI*2 * t / 5.0;
  const lk = Math.PI*2 * t / 6.0;
  function rot(name, rx, ry, rz) {
    const b = bones[name];
    if (!b || !b.userData.rest) return;
    _E.set(rx, ry, rz, 'XYZ');
    _Q.setFromEuler(_E);
    b.quaternion.copy(b.userData.rest).multiply(_Q);
  }
  rot('Hips',          D(0.2)*Math.sin(br), 0, 0);
  rot('Spine',         D(0.5)*Math.sin(br), 0, 0);
  rot('Spine1',        D(0.4)*Math.sin(br), 0, 0);
  rot('Spine2',        D(0.3)*Math.sin(br), 0, 0);
  rot('Neck',          0, D(10)*Math.sin(lk)*0.3, 0);
  rot('Head',          0, D(30)*Math.sin(lk), 0);
  rot('LeftShoulder',  0, 0, 0);
  rot('LeftArm',       D(1)*Math.sin(br), 0, 0);
  rot('LeftForeArm',   D(2), 0, 0);
  rot('LeftHand',      0, 0, 0);
  rot('RightShoulder', 0, 0, 0);
  rot('RightArm',      D(1)*Math.sin(br + Math.PI), 0, 0);
  rot('RightForeArm',  D(2), 0, 0);
  rot('RightHand',     0, 0, 0);
}

gltfLoader.load(
  MODEL_PATH,
  (gltf) => {
    character = gltf.scene;

    character.traverse(obj => {
      if (obj.isMesh) {
        obj.castShadow    = true;
        obj.receiveShadow = true;
      }
    });

    // Positionner au centre, dos vers la caméra (rotation 180° = face vers -Z)
    character.position.set(0, 0, 0);
    character.rotation.y = Math.PI;
    scene.add(character);

    // Collecter les bones + pose de repos pour l'idle
    character.traverse(o => {
      if (o.isBone) { bones[o.name] = o; o.userData.rest = o.quaternion.clone(); }
    });

    // Animation mixer
    mixer = new THREE.AnimationMixer(character);
    if (gltf.animations.length > 0) {
      walkAction = mixer.clipAction(gltf.animations[0]);
      walkAction.setLoop(THREE.LoopRepeat);
      walkAction.clampWhenFinished = false;
    }

    // Masquer le loading
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('info-anim').textContent = 'Animation : idle';
  },
  (xhr) => {
    const pct = Math.round((xhr.loaded / xhr.total) * 100);
    document.getElementById('loading-bar').style.width = pct + '%';
    document.getElementById('loading-text').textContent = `Chargement… ${pct}%`;
  },
  (err) => {
    document.getElementById('loading-text').textContent = 'Erreur de chargement : ' + err.message;
    console.error(err);
  }
);

/* ═══════════════════════════════════════════
   CLAVIER
═══════════════════════════════════════════ */
const keys = { up: false, down: false, left: false, right: false };
const keyMap = {
  ArrowUp:    'up',   KeyW: 'up',
  ArrowDown:  'down', KeyS: 'down',
  ArrowLeft:  'left', KeyA: 'left',
  ArrowRight: 'right',KeyD: 'right',
};

const keyEls = {
  up:    document.getElementById('key-up'),
  down:  document.getElementById('key-down'),
  left:  document.getElementById('key-left'),
  right: document.getElementById('key-right'),
};

window.addEventListener('keydown', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = true; keyEls[k].classList.add('active'); e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  const k = keyMap[e.code];
  if (k) { keys[k] = false; keyEls[k].classList.remove('active'); }
});

/* ═══════════════════════════════════════════
   JOYSTICK TACTILE
═══════════════════════════════════════════ */
const jZone   = document.getElementById('joystick-zone');
const jHandle = document.getElementById('joystick-handle');
const J_RADIUS = 38, J_DEAD = 0.25;
let jActive = false, jId = null, jCx = 0, jCy = 0;

function jStart(cx, cy, tx, ty) { jActive=true; jCx=cx; jCy=cy; jMove(tx,ty); }
function jMove(tx, ty) {
  if (!jActive) return;
  const dx=tx-jCx, dy=ty-jCy, dist=Math.sqrt(dx*dx+dy*dy), cl=Math.min(dist,J_RADIUS);
  const nx=dist>0?dx/dist:0, ny=dist>0?dy/dist:0;
  jHandle.style.transform=`translate(calc(-50% + ${nx*cl}px), calc(-50% + ${ny*cl}px))`;
  keys.up    = ny < -J_DEAD;
  keys.down  = ny >  J_DEAD;
  keys.left  = nx < -J_DEAD;
  keys.right = nx >  J_DEAD;
}
function jEnd() {
  jActive=false;
  jHandle.style.transform='translate(-50%,-50%)';
  keys.up=keys.down=keys.left=keys.right=false;
}
jZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=jZone.getBoundingClientRect(), t=e.changedTouches[0];
  jId=t.identifier; jStart(r.left+r.width/2, r.top+r.height/2, t.clientX, t.clientY);
},{passive:false});
window.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches) if(t.identifier===jId){e.preventDefault();jMove(t.clientX,t.clientY);break;}
},{passive:false});
window.addEventListener('touchend',    e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
window.addEventListener('touchcancel', e=>{for(const t of e.changedTouches)if(t.identifier===jId)jEnd();});
jZone.addEventListener('mousedown', e=>{
  const r=jZone.getBoundingClientRect();
  jStart(r.left+r.width/2, r.top+r.height/2, e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => { if (jActive) jMove(e.clientX, e.clientY); });
window.addEventListener('mouseup',   () => { if (jActive) jEnd(); });

/* ═══════════════════════════════════════════
   CONTRÔLE CAMÉRA — OrbitControls complet
   Rotation · Zoom · Vertical · Tactile
═══════════════════════════════════════════ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.07;
controls.minDistance      = 1.0;
controls.maxDistance      = 60;
controls.maxPolarAngle    = Math.PI / 2 - 0.01;
controls.enablePan        = false;
controls.rotateSpeed      = 0.85;
controls.zoomSpeed        = 1.2;

/* La caméra suit le personnage en restant à l'angle choisi */
function updateCamera() {
  if (!character) {
    controls.update();
    return;
  }
  const tgt = new THREE.Vector3(
    character.position.x,
    character.position.y + 0.9,
    character.position.z
  );
  /* Décaler la caméra avec le personnage sans changer l'orbite */
  const offset = camera.position.clone().sub(controls.target);
  controls.target.lerp(tgt, 0.12);
  camera.position.copy(controls.target).add(offset);
  controls.update();
}

/* ═══════════════════════════════════════════
   BOUCLE PRINCIPALE
═══════════════════════════════════════════ */
const clock = new THREE.Clock();
const infoPos  = document.getElementById('info-pos');
const infoAnim = document.getElementById('info-anim');

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (character) {
    let moving = false;

    // Rotation
    if (keys.left)  character.rotation.y += TURN_SPEED * dt;
    if (keys.right) character.rotation.y -= TURN_SPEED * dt;

    // Déplacement avant/arrière
    if (keys.up) {
      character.position.x += Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z += Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }
    if (keys.down) {
      character.position.x -= Math.sin(character.rotation.y) * WALK_SPEED * dt;
      character.position.z -= Math.cos(character.rotation.y) * WALK_SPEED * dt;
      moving = true;
    }

    // Coller le personnage sur le terrain
    character.position.y = duneH(character.position.x, character.position.z);

    // Transition walk ↔ idle avec fondu 0.5s
    if (moving && !isWalking) {
      isWalking = true; fadeOut = false; idleTimer = 0;
      if (walkAction) walkAction.reset().play();
      infoAnim.textContent = 'Animation : marche';
    } else if (!moving && isWalking) {
      isWalking = false; fadeOut = true; fadeTimer = 0;
      if (walkAction) walkAction.fadeOut(FADE_DUR);
      infoAnim.textContent = 'Animation : idle';
    }

    // Animation
    if (isWalking) {
      if (mixer) mixer.update(dt);
    } else if (fadeOut) {
      fadeTimer += dt;
      if (mixer) mixer.update(dt);
      if (fadeTimer >= FADE_DUR) { fadeOut = false; if (walkAction) walkAction.stop(); }
    } else {
      idleTimer += dt;
      applyIdle(idleTimer);
    }

    // Info position
    infoPos.textContent = `Position : ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;

  }

  // ── Vent de sable + brouillard ───────────────
  fogTime += dt;
  const wx   = getWx(fogTime);
  const wz   = getWz(fogTime);
  const gust = 0.5 + 0.38*Math.sin(fogTime*0.08) + 0.14*Math.sin(fogTime*0.23);

  // Brouillard exponentiel pulsé (rafales)
  scene.fog.density = 0.0025 + gust * 0.006;

  // Voile CSS bas d'écran (sable qui remonte)
  sandVeil.style.opacity = (0.25 + gust * 0.55).toFixed(2);

  const cx = camera.position.x, cz = camera.position.z;

  // Couche sol
  const pg = gGeo.attributes.position;
  for (let i = 0; i < G_N; i++) {
    const tb = 1.3 * Math.sin(fogTime * 1.0 + gPh[i]);
    pg.array[i*3]   += (wx + tb) * dt;
    pg.array[i*3+1] += 0.06 * Math.sin(fogTime * 1.2 + gPh[i]) * dt;
    pg.array[i*3+2] += (wz + 0.45 * Math.cos(fogTime * 0.8 + gPh[i])) * dt;
    if (pg.array[i*3] - cx >  45) { pg.array[i*3] = cx - 45; pg.array[i*3+1] = Math.random() * 0.55; }
    if (pg.array[i*3] - cx < -45) { pg.array[i*3] = cx + 45; pg.array[i*3+1] = Math.random() * 0.55; }
    if (pg.array[i*3+2] - cz >  45) pg.array[i*3+2] = cz - 45;
    if (pg.array[i*3+2] - cz < -45) pg.array[i*3+2] = cz + 45;
    if (pg.array[i*3+1] < -0.1) pg.array[i*3+1] = 0.45 + Math.random() * 0.1;
    if (pg.array[i*3+1] >  0.65) pg.array[i*3+1] = Math.random() * 0.2;
  }
  pg.needsUpdate = true;

  // Couche mi-hauteur
  const pm = mGeo.attributes.position;
  for (let i = 0; i < M_N; i++) {
    const tb = 0.9 * Math.sin(fogTime * 0.65 + mPh[i]);
    pm.array[i*3]   += (wx * 0.55 + tb) * dt;
    pm.array[i*3+1] += 0.15 * Math.sin(fogTime * 0.85 + mPh[i]) * dt;
    pm.array[i*3+2] += (wz * 0.55 + 0.35 * Math.cos(fogTime * 0.55 + mPh[i])) * dt;
    if (pm.array[i*3] - cx >  65) pm.array[i*3] = cx - 65;
    if (pm.array[i*3] - cx < -65) pm.array[i*3] = cx + 65;
    if (pm.array[i*3+2] - cz >  65) pm.array[i*3+2] = cz - 65;
    if (pm.array[i*3+2] - cz < -65) pm.array[i*3+2] = cz + 65;
    if (pm.array[i*3+1] <  0.2) pm.array[i*3+1] = 0.5 + Math.random() * 5.5;
    if (pm.array[i*3+1] >  6.5) pm.array[i*3+1] = 0.5 + Math.random() * 2.5;
  }
  pm.needsUpdate = true;

  // Couche brume haute
  const ph = hGeo.attributes.position;
  for (let i = 0; i < H_N; i++) {
    ph.array[i*3]   += (wx * 0.22 + 0.35*Math.sin(fogTime*0.32 + hPh[i])) * dt;
    ph.array[i*3+1] += 0.09 * Math.sin(fogTime * 0.38 + hPh[i]) * dt;
    ph.array[i*3+2] += (wz * 0.22 + 0.18*Math.cos(fogTime*0.28 + hPh[i])) * dt;
    if (ph.array[i*3] - cx >  100) ph.array[i*3] = cx - 100;
    if (ph.array[i*3] - cx < -100) ph.array[i*3] = cx + 100;
    if (ph.array[i*3+2] - cz >  100) ph.array[i*3+2] = cz - 100;
    if (ph.array[i*3+2] - cz < -100) ph.array[i*3+2] = cz + 100;
    if (ph.array[i*3+1] <  4.0) ph.array[i*3+1] = 6.0 + Math.random() * 18.0;
    if (ph.array[i*3+1] > 26.0) ph.array[i*3+1] = 5.0 + Math.random() * 12.0;
  }
  ph.needsUpdate = true;

  updateCamera();
  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════
   AUDIO — Ambiance sonore (Adhan / Désert)
═══════════════════════════════════════════ */
let _audioCtx    = null;
let _audioBuffer = null;
let _audioSource = null;
let _isPlaying   = false;

const AUDIO_URL = 'https://upload.wikimedia.org/wikipedia/commons/transcoded/8/86/Azan.ogg/Azan.ogg.mp3';

async function preloadAudio() {
  try {
    const r = await fetch(AUDIO_URL);
    _audioBuffer = await r.arrayBuffer();
    console.log("✅ Audio d'ambiance chargé");
  } catch (e) {
    console.warn("⚠️ Impossible de charger l'audio");
  }
}
preloadAudio();

window.toggleAudio = async function() {
  const btn = document.getElementById('btn-audio');
  const icon = document.getElementById('audio-icon');

  if (_isPlaying) {
    if (_audioSource) { _audioSource.stop(); _audioSource = null; }
    _isPlaying = false;
    btn.classList.remove('playing');
    icon.textContent = '♪';
    return;
  }

  if (!_audioBuffer) return;

  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') await _audioCtx.resume();

  const decoded = await _audioCtx.decodeAudioData(_audioBuffer.slice(0));
  _audioSource = _audioCtx.createBufferSource();
  _audioSource.buffer = decoded;
  _audioSource.loop = true;

  const gain = _audioCtx.createGain();
  gain.gain.value = 0.45;
  _audioSource.connect(gain);
  gain.connect(_audioCtx.destination);

  _audioSource.start(0);
  _isPlaying = true;
  btn.classList.add('playing');
  icon.textContent = '🔇';
};

animate();

   RESIZE
═══════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
